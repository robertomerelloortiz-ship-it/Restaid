<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TalaBar · Fichaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#101A26;          /* navy profundo de fondo */
  --bg2:#16222F;
  --surf:#1C2A39;        /* superficie elevada */
  --surf2:#22344A;
  --line:rgba(255,255,255,.08);
  --line2:rgba(255,255,255,.14);
  --amber:#F0A04B;
  --amber-dk:#D07F28;
  --amber-soft:rgba(240,160,75,.14);
  --green:#34C281;
  --green-dk:#1E9460;
  --green-soft:rgba(52,194,129,.14);
  --red:#E0604E;
  --red-soft:rgba(224,96,78,.14);
  --tx:#F4F1EA;          /* texto claro cálido */
  --tx2:#9FB2C2;         /* muted */
  --tx3:#5E7283;         /* faint */
  --r:14px;--r2:18px;--r3:26px;
  --shadow:0 10px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;touch-action:manipulation;overflow-x:hidden}
.serif{font-family:'Fraunces',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ════════ SCREENS ════════ */
.screen{display:none;min-height:100vh;min-height:100dvh}
.screen.on{display:flex}

/* ════════ REST (reloj + PIN) ════════ */
#s-rest{flex-direction:column}
.rest-wrap{flex:1;display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:880px){.rest-wrap{grid-template-columns:1.15fr .85fr}}

.clock-side{display:flex;flex-direction:column;padding:1.4rem 1.5rem 2rem;position:relative;background:
  radial-gradient(140% 100% at 50% 0%, rgba(240,160,75,.05), transparent 60%);}
.brand{display:flex;align-items:center;gap:.55rem;flex-shrink:0}
.clock-center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:0;padding:1.5rem 0}
.brand-mark{width:34px;height:34px;border-radius:9px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;color:#1a1207;font-size:19px}
.brand-name{font-weight:600;font-size:1.05rem;letter-spacing:.01em}
.brand-name small{display:block;font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.18em;font-weight:600;margin-top:1px}

.clock{ text-align:center; }
.clock-time{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(4.5rem,17vw,9rem);line-height:.92;letter-spacing:-.02em;font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.clock-time .sec{font-size:.34em;color:var(--amber);vertical-align:super;margin-left:.12em;font-weight:600}
.clock-date{margin-top:.7rem;font-size:clamp(.95rem,2.6vw,1.2rem);color:var(--tx2);font-weight:500;letter-spacing:.01em}

.presence{margin-top:2.2rem;width:100%;max-width:420px}
.presence-hd{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);font-weight:600;margin-bottom:.85rem}
.presence-hd .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite}
.presence-row{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.pres-chip{display:flex;align-items:center;gap:.5rem;background:var(--surf);border:1px solid var(--line);border-radius:999px;padding:.32rem .7rem .32rem .35rem}
.pres-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:700;color:#fff;flex-shrink:0}
.pres-name{font-size:.82rem;font-weight:600}
.pres-since{font-size:.72rem;color:var(--tx3);font-variant-numeric:tabular-nums}
.pres-empty{font-size:.85rem;color:var(--tx3);text-align:center}

/* PIN side */
.pin-side{background:var(--bg2);border-left:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;padding:1.8rem 1.5rem 2.2rem}
@media(max-width:879px){.pin-side{border-left:none;border-top:1px solid var(--line)}}
.pin-prompt{text-align:center;font-size:1rem;color:var(--tx2);font-weight:500;margin-bottom:.3rem}
.pin-msg{text-align:center;min-height:24px;font-size:.88rem;font-weight:600;margin-bottom:.9rem;transition:color .2s}
.pin-msg.err{color:var(--red)}
.pin-dots{display:flex;justify-content:center;gap:16px;margin-bottom:1.6rem}
.pin-dot{width:15px;height:15px;border-radius:50%;background:transparent;border:2px solid var(--line2);transition:all .15s}
.pin-dot.on{background:var(--amber);border-color:var(--amber);transform:scale(1.05)}
.pin-dot.shake{animation:shake .4s}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;max-width:380px;margin:0 auto;width:100%}
.key{aspect-ratio:1.55/1;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);font-family:'Fraunces',serif;font-size:2rem;font-weight:500;color:var(--tx);transition:transform .08s,background .12s;display:flex;align-items:center;justify-content:center}
.key:active{transform:scale(.94);background:var(--surf2)}
.key.fn{font-family:'DM Sans';font-size:1.4rem;color:var(--tx2);background:transparent}
.key.del:active{background:var(--red-soft)}

/* ════════ USER (identidad + acción) ════════ */
#s-user{flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1.2rem 2rem;max-width:560px;margin:0 auto;width:100%}
.u-top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.u-back{display:flex;align-items:center;gap:.4rem;color:var(--tx2);font-size:.92rem;font-weight:600;padding:.5rem .2rem}
.u-clock{font-size:.95rem;color:var(--tx2);font-weight:600;font-variant-numeric:tabular-nums}
.u-hero{text-align:center;margin-bottom:1.6rem}
.u-av{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:2rem;font-weight:600;color:#fff;margin:0 auto .9rem;box-shadow:var(--shadow)}
.u-av img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.u-greet{font-size:1rem;color:var(--tx2);font-weight:500}
.u-name{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:600;line-height:1.1;margin-top:.1rem}

.state-card{width:100%;background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:1.3rem;text-align:center;margin-bottom:1.3rem}
.state-pill{display:inline-flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.4rem .9rem;border-radius:999px;margin-bottom:.8rem}
.state-pill.in{background:var(--green-soft);color:var(--green)}
.state-pill.out{background:var(--amber-soft);color:var(--amber)}
.state-pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.state-pill.in .dot{animation:pulse 1.8s ease-in-out infinite}
.state-big{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.state-sub{font-size:.92rem;color:var(--tx2);margin-top:.45rem}

.act-btn{width:100%;border-radius:var(--r2);padding:1.5rem;font-size:1.4rem;font-weight:700;color:#0e1620;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:transform .1s,filter .12s;box-shadow:var(--shadow)}
.act-btn:active{transform:scale(.98);filter:brightness(.95)}
.act-btn.entrada{background:var(--green)}
.act-btn.salida{background:var(--amber)}
.act-btn .ic{font-size:1.5rem}

.timeline{width:100%;margin-top:1.5rem}
.tl-hd{font-size:.74rem;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);font-weight:700;margin-bottom:.8rem;text-align:left}
.tl-track{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;align-items:center;gap:.85rem;padding:.55rem 0}
.tl-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.tl-ic.in{background:var(--green-soft);color:var(--green)}
.tl-ic.out{background:var(--amber-soft);color:var(--amber)}
.tl-label{flex:1;text-align:left;font-weight:600;font-size:.95rem}
.tl-time{font-size:1.05rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx)}
.tl-empty{color:var(--tx3);font-size:.9rem;text-align:left;padding:.4rem 0}

.alt-link{margin-top:1.6rem;display:flex;align-items:center;justify-content:center;gap:.5rem;color:var(--tx2);font-size:.95rem;font-weight:600;padding:.85rem;border:1px dashed var(--line2);border-radius:var(--r);width:100%}
.alt-link:active{background:var(--surf)}

.warn-banner{width:100%;background:var(--red-soft);border:1px solid rgba(224,96,78,.3);color:var(--red);border-radius:var(--r);padding:.7rem .9rem;font-size:.85rem;font-weight:600;margin-bottom:1.1rem;display:flex;gap:.5rem;align-items:flex-start;text-align:left}

/* ════════ DONE (confirmación) ════════ */
#s-done{flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.done-ring{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:1.6rem;position:relative}
.done-ring svg{position:absolute;inset:0;width:100%;height:100%}
.done-ic{font-size:3.4rem;z-index:1;animation:pop .45s cubic-bezier(.2,1.3,.4,1)}
.done-name{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600}
.done-action{font-size:1.05rem;color:var(--tx2);font-weight:500;margin-top:.3rem}
.done-stamp{margin-top:1.4rem;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:.8rem 1.5rem;display:inline-flex;align-items:center;gap:.7rem}
.done-stamp .lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);font-weight:700}
.done-stamp .val{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600;font-variant-numeric:tabular-nums}
.done-extra{margin-top:1rem;font-size:.95rem;color:var(--tx2)}
.done-count{margin-top:1.8rem;font-size:.82rem;color:var(--tx3)}

/* ════════ ALBARÁN ════════ */
#s-alb{flex-direction:column;padding:0}
.alb-top{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.3rem;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
.alb-top h2{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600}
.alb-body{padding:1.3rem;max-width:620px;margin:0 auto;width:100%}
.alb-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.2rem}
.cap-btn{padding:1.5rem 1rem;border-radius:var(--r2);font-size:1.1rem;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:.5rem;transition:transform .1s}
.cap-btn:active{transform:scale(.97)}
.cap-btn .ic{font-size:1.9rem}
.cap-btn.cam{background:var(--amber);color:#0e1620}
.cap-btn.gal{background:var(--surf);color:var(--tx);border:1px solid var(--line2)}
#cam-input,#gal-input{display:none}
.alb-hint{font-size:.85rem;color:var(--tx3);margin-bottom:1rem;text-align:center}
#alb-queue{display:flex;flex-direction:column;gap:14px;padding-bottom:90px}
.alb-card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r2);padding:1rem}
.alb-card.ready{border-color:rgba(52,194,129,.3)}
.alb-card.err{border-color:rgba(224,96,78,.3)}
.alb-card.done{border-color:rgba(52,194,129,.4);opacity:.85}
.ac-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;gap:.5rem}
.ac-file{font-size:.85rem;font-weight:600;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-remove{width:26px;height:26px;border-radius:7px;background:var(--bg2);color:var(--tx2);font-size:1.2rem;line-height:1;flex-shrink:0}
.ac-remove:active{background:var(--red-soft);color:var(--red)}
.ac-status{display:flex;align-items:center;gap:.6rem;font-size:.92rem;color:var(--tx2);padding:.4rem 0}
.ac-dot{width:9px;height:9px;border-radius:50%}
.ac-dot.q{background:var(--tx3)}
.ac-detected{background:var(--amber-soft);color:var(--amber);border-radius:var(--r);padding:.55rem .8rem;font-size:.85rem;margin-bottom:.8rem}
.ac-fields{display:grid;grid-template-columns:1fr 140px;gap:10px;margin-bottom:.6rem}
@media(max-width:480px){.ac-fields{grid-template-columns:1fr}}
.alb-applybar{display:none;position:fixed;left:0;right:0;bottom:0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:20}
.alb-applybar.on{display:block}
.alb-applybar .btn-aplicar{max-width:620px;margin:0 auto;display:block}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:.45rem}
.fg select,.fg input{width:100%;padding:.8rem;border:1px solid var(--line2);border-radius:var(--r);font-size:1rem;font-family:inherit;background:var(--bg2);color:var(--tx)}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--amber)}
.btn-aplicar{width:100%;padding:1.1rem;background:var(--green);color:#0e1620;border-radius:var(--r);font-size:1.05rem;font-weight:700;margin-top:.4rem}
.btn-aplicar:disabled{opacity:.5}
table.alb-tbl{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.6rem;background:var(--surf);border-radius:var(--r);overflow:hidden}
table.alb-tbl th,table.alb-tbl td{padding:.55rem;border-bottom:1px solid var(--line);text-align:left}
table.alb-tbl th{background:var(--bg2);font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--tx2)}
table.alb-tbl input{width:100%;border:none;background:transparent;font-size:.85rem;font-family:inherit;color:var(--tx)}
table.alb-tbl input:focus{outline:1px solid var(--amber);border-radius:4px}
.conv-chip{font-size:.68rem;color:var(--amber);background:var(--amber-soft);padding:1px 6px;border-radius:8px;white-space:nowrap}
.alert{padding:1rem;border-radius:var(--r);font-weight:600;margin-top:.7rem;font-size:.92rem}
.alert-red{background:var(--red-soft);color:var(--red)}
.alert-green{background:var(--green-soft);color:var(--green)}
.alert-info{background:var(--amber-soft);color:var(--amber)}
.spin{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.18);border-top-color:var(--amber);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}

@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes ringdraw{to{stroke-dashoffset:0}}
@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>

<!-- ════════ REST ════════ -->
<div class="screen on" id="s-rest">
  <div class="rest-wrap">
    <div class="clock-side">
      <div class="brand"><div class="brand-mark">T</div><div class="brand-name">TalaBar<small>Fichaje</small></div></div>
      <div class="clock-center">
        <div class="clock">
          <div class="clock-time" id="clock"><span id="ck-hm">00:00</span><span class="sec" id="ck-s">00</span></div>
          <div class="clock-date" id="ck-date">&nbsp;</div>
        </div>
        <div class="presence" id="presence"></div>
      </div>
    </div>
    <div class="pin-side">
      <div class="pin-prompt">Introduce tu PIN</div>
      <div class="pin-msg" id="pin-msg"></div>
      <div class="pin-dots" id="pin-dots"></div>
      <div class="pad">
        <button class="key" onclick="fpKey('1')">1</button>
        <button class="key" onclick="fpKey('2')">2</button>
        <button class="key" onclick="fpKey('3')">3</button>
        <button class="key" onclick="fpKey('4')">4</button>
        <button class="key" onclick="fpKey('5')">5</button>
        <button class="key" onclick="fpKey('6')">6</button>
        <button class="key" onclick="fpKey('7')">7</button>
        <button class="key" onclick="fpKey('8')">8</button>
        <button class="key" onclick="fpKey('9')">9</button>
        <button class="key fn del" onclick="fpDel()">borrar</button>
        <button class="key" onclick="fpKey('0')">0</button>
        <button class="key fn" onclick="fpEnter()">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- ════════ USER ════════ -->
<div class="screen" id="s-user">
  <div class="u-top">
    <button class="u-back" onclick="goRest()">&#8592; Salir</button>
    <div class="u-clock tnum" id="u-clock">00:00</div>
  </div>
  <div class="u-hero">
    <div class="u-av" id="u-av"></div>
    <div class="u-greet" id="u-greet"></div>
    <div class="u-name" id="u-name"></div>
  </div>
  <div id="u-warn"></div>
  <div class="state-card">
    <div id="u-state-pill"></div>
    <div class="state-big tnum" id="u-state-big">&mdash;</div>
    <div class="state-sub" id="u-state-sub"></div>
  </div>
  <button class="act-btn" id="u-act" onclick="ficharBtn()"></button>
  <div class="timeline" id="u-timeline"></div>
  <button class="alt-link" onclick="goAlb()">&#128247; Escanear un albar&aacute;n</button>
</div>

<!-- ════════ DONE ════════ -->
<div class="screen" id="s-done">
  <div class="done-ring" id="done-ring">
    <svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="56" fill="none" stroke="var(--line)" stroke-width="4"/><circle id="done-arc" cx="60" cy="60" r="56" fill="none" stroke-width="5" stroke-linecap="round" transform="rotate(-90 60 60)" stroke-dasharray="352" stroke-dashoffset="352"/></svg>
    <div class="done-ic" id="done-ic"></div>
  </div>
  <div class="done-name" id="done-name"></div>
  <div class="done-action" id="done-action"></div>
  <div class="done-stamp"><span class="lbl">Hora</span><span class="val tnum" id="done-stamp"></span></div>
  <div class="done-extra" id="done-extra"></div>
  <div class="done-count" id="done-count"></div>
</div>

<!-- ════════ ALBARÁN ════════ -->
<div class="screen" id="s-alb">
  <div class="alb-top">
    <h2>Escanear albaranes</h2>
    <button class="u-back" onclick="backFromAlb()">&#8592; Volver</button>
  </div>
  <div class="alb-body">
    <div class="alb-btns">
      <button class="cap-btn cam" onclick="document.getElementById('cam-input').click()"><span class="ic">&#128247;</span>Hacer foto</button>
      <button class="cap-btn gal" onclick="document.getElementById('gal-input').click()"><span class="ic">&#128194;</span>Galer&iacute;a / archivos</button>
    </div>
    <p class="alb-hint" id="alb-hint">Puedes elegir varias fotos o archivos a la vez.</p>
    <input type="file" id="cam-input" accept="image/*" capture="environment" multiple onchange="handleAlbaran(this)">
    <input type="file" id="gal-input" accept="image/*,application/pdf" multiple onchange="handleAlbaran(this)">
    <div id="alb-queue"></div>
  </div>
  <div class="alb-applybar" id="alb-applybar">
    <button class="btn-aplicar" id="btn-alb-aplicar" onclick="aplicarTodos()">Aplicar a stock</button>
  </div>
</div>

<script>
const SB_URL='https://gtdsqvebuhdndfaiqoyj.supabase.co';
const SB_KEY='sb_publishable_cu53L_4O6Rz-RlGurDI3Kg_CJHqaa8U';
const SB_RESTAURANTE='default';
const API='/api/claude', ALB_MODEL='claude-sonnet-4-6';
const AVCOLORS=['#3E6E8E','#E8914A','#5A8A6A','#8A5A2A','#6A2A8A','#2A6A8A','#8A6A2A','#1D7A4A','#C0604E','#4A5A8A'];
let _uidc=0;
const uid=()=>Date.now().toString(36)+(_uidc++).toString(36)+Math.random().toString(36).slice(2,6);
const hoy=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);
let RRHH=null, INV=null, USER=null, albQueue=[];

function aiHeaders(){return {'Content-Type':'application/json','x-restaid-pass':'personal'};}
async function aiCheck(r){if(r.ok)return;let det='';try{const e=await r.json();det=e&&e.error&&e.error.message?': '+e.error.message:'';}catch(_){}const m={401:'clave de API no v\u00e1lida',429:'l\u00edmite de uso alcanzado',529:'IA saturada, reint\u00e9ntalo',400:'petici\u00f3n rechazada',500:'error interno IA'}[r.status]||('error '+r.status);throw new Error(m+det);}
async function sbGet(table){try{const r=await fetch(`${SB_URL}/rest/v1/${table}?restaurante=eq.${SB_RESTAURANTE}&select=datos`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});if(!r.ok)return null;const d=await r.json();return d&&d[0]?d[0].datos:null;}catch(e){console.error('sbGet '+table,e);return null;}}
async function sbWrite(table,datos){try{datos._ts=Date.now();const rP=await fetch(`${SB_URL}/rest/v1/${table}?restaurante=eq.${SB_RESTAURANTE}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({datos})});const txt=await rP.text().catch(()=>'');let patched=[];try{patched=JSON.parse(txt);}catch(e){}if(Array.isArray(patched)&&patched.length===0){await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({restaurante:SB_RESTAURANTE,datos})});}return true;}catch(e){console.error('sbWrite '+table,e);return false;}}

/* ── Reloj en vivo ── */
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIASEM=['domingo','lunes','martes','mi\u00e9rcoles','jueves','viernes','s\u00e1bado'];
function tick(){
  const n=new Date();
  const hm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const s=String(n.getSeconds()).padStart(2,'0');
  if($('ck-hm'))$('ck-hm').textContent=hm;
  if($('ck-s'))$('ck-s').textContent=s;
  if($('ck-date')){const dia=DIASEM[n.getDay()];$('ck-date').textContent=`${dia.charAt(0).toUpperCase()+dia.slice(1)}, ${n.getDate()} de ${MESES[n.getMonth()]}`;}
  if($('u-clock'))$('u-clock').textContent=hm;
}
setInterval(tick,1000);

function fpKey(n){if(PIN.length<4){PIN+=n;$('pin-msg').textContent='';renderDots();if(PIN.length===4)setTimeout(fpEnter,140);}}

/* ── Fichaje (escribe al mismo blob rrhh que RESTAID) ── */
function fichajesDia(empId,fechaISO){return(RRHH.fichajes||[]).filter(f=>f.empId===empId&&f.fecha===fechaISO).sort((a,b)=>a.ts.localeCompare(b.ts));}
function minFichadosDia(empId,fechaISO){const fs=fichajesDia(empId,fechaISO);let min=0,lastIn=null;fs.forEach(f=>{if(f.tipo==='entrada')lastIn=f.ts;else if(f.tipo==='salida'&&lastIn){min+=(new Date(f.ts)-new Date(lastIn))/60000;lastIn=null;}});if(lastIn&&fechaISO===hoy())min+=(Date.now()-new Date(lastIn))/60000;return Math.max(0,min);}
function estadoFichaje(empId){const h=hoy(),fs=fichajesDia(empId,h);let dentro=false,desde=null;fs.forEach(f=>{if(f.tipo==='entrada'){dentro=true;desde=f.ts;}else if(f.tipo==='salida'){dentro=false;desde=null;}});return {dentro,desde,min:minFichadosDia(empId,h),fichajes:fs};}
function fmtHM(min){min=Math.round(min);const h=Math.floor(min/60),m=min%60;return h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m`;}
function fmtHora(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

let fichando=false;

}

/* ── ALBARÁN (idéntico a RESTAID) ── */
function llenarProveedores(){if(!INV)return;$('alb-prov').innerHTML='<option value="">\u2014 Seleccionar \u2014</option>'+(INV.proveedores||[]).map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('');}
function f2b64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Error lectura'));r.readAsDataURL(file);});}
function _albSysPrompt(){return `Eres un experto en digitalizar albaranes y facturas de proveedores de hosteleria espanola, y ademas RAZONAS sobre los productos como lo haria un jefe de cocina experto. No solo transcribes: interpretas formatos, conviertes unidades y deduces categorias. Devuelve UNICAMENTE un JSON valido, sin texto adicional ni bloques markdown.

ESTRUCTURA DEL JSON A DEVOLVER:
{"documento":{"tipo":"albaran|factura|ticket","numero":"string o null","fecha":"YYYY-MM-DD o null","forma_pago":"string o null"},"proveedor":{"nombre":"string o null","cif":"string o null","telefono":"string o null","categoria_sugerida":"string"},"cliente":{"nombre":"string o null","nif":"string o null"},"lineas":[{"descripcion":"NOMBRE COMERCIAL LIMPIO","cantidad_compra":0.000,"unidad_compra":"lata|barril|caja|botella|saco|ud|kg|l","formato":"texto del formato detectado o null","cantidad_base":0.000,"unidad_base":"kg|l|ud","factor":0.000,"precio_unitario":0.00,"iva_pct":10,"importe":0.00,"lote":"string o null","categoria":"string","razonamiento":"breve explicacion de la conversion"}],"totales":{"base_10":0.00,"iva_10":0.00,"base_21":0.00,"iva_21":0.00,"total":0.00},"alertas":[]}

REGLAS CRITICAS:

1. NUMERO DE DOCUMENTO: Es el numero oficial impreso en la cabecera junto a "NUMERO", "N\u00ba", "FACTURA" o "ALBARAN" (formato tipo "23A/76010199").
   NUNCA uses el numero interno que aparece dentro de la descripcion de un articulo (ej: "Albaran 26015650").

2. FECHA: La del campo FECHA en la cabecera. Formato YYYY-MM-DD. NUNCA la de dentro de la descripcion de articulos.

3. DESCRIPCION \u2014 SOLO el nombre comercial limpio. La celda suele tener varias lineas: ignora la referencia interna y el lote, usa el nombre del producto. El lote va en su campo.

4. INTERPRETACION DE FORMATO Y CONVERSION (lo mas importante):
   Los albaranes indican cantidades en UNIDAD DE COMPRA (latas, barriles, cajas...), pero para el escandallo necesitamos la UNIDAD BASE usable (kg, l, ud). Debes razonar y rellenar AMBAS.
   - "cantidad_compra" + "unidad_compra": lo que literalmente pone el albaran (ej: 5 latas, 1 barril).
   - Detecta el FORMATO en el nombre del producto: numeros como "750", "50L", "1L", "5kg", "x12", "70cl" indican el contenido por unidad.
   - "factor": contenido de cada unidad de compra en unidad base. Ej: lata de 750g -> factor 0.75 (kg). Barril 50L -> factor 50 (l).
   - "cantidad_base" = cantidad_compra x factor. "unidad_base" = kg o l o ud.
   - "razonamiento": explica brevemente (ej: "5 latas x 750g = 3.75 kg").
   EJEMPLOS:
   - "ATUN CALVO ACT.GRL RO. 750" cantidad 5 -> cantidad_compra:5, unidad_compra:"lata", formato:"750 g/lata", factor:0.75, cantidad_base:3.75, unidad_base:"kg"
   - "CRUZCAMPO Especial Barril 50L Grundy LS" cantidad 1 -> cantidad_compra:1, unidad_compra:"barril", formato:"50 L/barril", factor:50, cantidad_base:50, unidad_base:"l"
   - "MOJAMA DE ATUN" cantidad 1.358 unidad kg -> factor:1, cantidad_base:1.358, unidad_base:"kg"
   Si NO hay formato detectable y la unidad ya es base (kg, l, ud), factor:1 y cantidad_base=cantidad_compra.
   Copia las cantidades EXACTAS con decimales (punto decimal en JSON, nunca redondees).

5. CATEGORIA del producto: deduce la categoria (Pescado, Carne, Verdura, Fruta, Pan, Bebida, Lacteo, Aceite, Conserva, Limpieza, Otros).

6. CATEGORIA SUGERIDA DEL PROVEEDOR: deduce a que se dedica por los productos. Ej: teleras -> "Panaderia"; mojama y pulpo -> "Pescaderia". Rellena "categoria_sugerida".

7. ALERTAS: anota manuscritos (DEVO, firmas), tachaduras, sellos, devoluciones, y avisa si tienes BAJA CONFIANZA en alguna conversion.`;}
async function extraerAlbaranDeFile(file){const b64=await f2b64(file);const isPDF=file.type==='application/pdf';const body={model:ALB_MODEL,max_tokens:2500,system:_albSysPrompt(),messages:[{role:'user',content:[isPDF?{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}:{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Digitaliza este albaran o factura. RAZONA sobre el formato de cada producto y convierte a unidad base. Devuelve SOLO el JSON, sin texto adicional.'}]}]};const r=await fetch(API,{method:'POST',headers:aiHeaders(),body:JSON.stringify(body)});if(!r.ok)await aiCheck(r);const d=await r.json();return JSON.parse((d.content?.find(c=>c.type==='text')?.text||'').replace(/```json|```/g,'').trim());}
/* ── Cola multi-albarán ──
   Cada item: {id, fileName, isPDF, status:'queue|analyzing|ready|error|applying|done', parsed, error} */
async function handleAlbaran(input){
  const files=Array.from(input.files||[]);input.value='';
  if(!files.length)return;
  files.forEach(f=>albQueue.push({id:uid(),fileName:f.name||'documento',isPDF:f.type==='application/pdf',file:f,status:'queue',parsed:null,error:null}));
  renderCola();
  procesarCola();
}
let procesandoCola=false;
async function procesarCola(){
  if(procesandoCola)return;procesandoCola=true;
  for(const item of albQueue){
    if(item.status!=='queue')continue;
    item.status='analyzing';renderCola();
    try{
      item.parsed=await extraerAlbaranDeFile(item.file);
      // Pre-resolver proveedor y fecha
      const p=item.parsed;
      const nom=p.proveedor&&(typeof p.proveedor==='object'?p.proveedor.nombre:p.proveedor);
      item.provId='';
      if(nom){const pv=(INV.proveedores||[]).find(x=>x.nombre.toLowerCase().includes((nom||'').toLowerCase().slice(0,8)));if(pv)item.provId=pv.id;}
      item.fecha=(p.documento&&p.documento.fecha)||hoy();
      item.file=null; // liberar memoria
      item.status='ready';
    }catch(e){item.status='error';item.error=e.message;item.file=null;}
    renderCola();
  }
  procesandoCola=false;
  actualizarApplyBar();
}
function actualizarApplyBar(){
  const ready=albQueue.filter(x=>x.status==='ready').length;
  const bar=$('alb-applybar'),btn=$('btn-alb-aplicar');
  if(ready>0){bar.classList.add('on');btn.textContent=ready>1?`Aplicar ${ready} albaranes a stock`:'Aplicar a stock';btn.disabled=false;}
  else bar.classList.remove('on');
}
function quitarAlb(id){albQueue=albQueue.filter(x=>x.id!==id);renderCola();actualizarApplyBar();}
function renderCola(){
  const box=$('alb-queue');if(!box)return;
  if(!albQueue.length){box.innerHTML='';$('alb-hint').style.display='block';return;}
  $('alb-hint').style.display='none';
  box.innerHTML=albQueue.map((item,idx)=>renderAlbCard(item,idx)).join('');
}
function renderAlbCard(item,idx){
  const head=`<div class="ac-head"><span class="ac-file">${esc(item.fileName)}</span>${item.status==='ready'||item.status==='error'||item.status==='done'?`<button class="ac-remove" onclick="quitarAlb('${item.id}')">&times;</button>`:''}</div>`;
  if(item.status==='queue')return `<div class="alb-card">${head}<div class="ac-status"><span class="ac-dot q"></span>En cola&hellip;</div></div>`;
  if(item.status==='analyzing')return `<div class="alb-card">${head}<div class="ac-status"><span class="spin"></span> Analizando con IA&hellip;</div></div>`;
  if(item.status==='error')return `<div class="alb-card err">${head}<div class="alert alert-red" style="margin:0">${esc(item.error||'No se pudo leer')}</div></div>`;
  if(item.status==='applying')return `<div class="alb-card">${head}<div class="ac-status"><span class="spin"></span> Aplicando&hellip;</div></div>`;
  if(item.status==='done')return `<div class="alb-card done">${head}<div class="alert alert-green" style="margin:0">&#10003; Aplicado a stock (${item.aplicados||0} productos)</div></div>`;
  // ready → editable
  const p=item.parsed;
  const nom=p.proveedor&&(typeof p.proveedor==='object'?p.proveedor.nombre:p.proveedor);
  const provOpts='<option value="">&mdash; Seleccionar &mdash;</option>'+(INV.proveedores||[]).map(pr=>`<option value="${pr.id}" ${item.provId===pr.id?'selected':''}>${esc(pr.nombre)}</option>`).join('');
  let rows='';
  (p.lineas||[]).forEach((l,i)=>{
    const cc=l.cantidad_compra!=null?l.cantidad_compra:(l.cantidad||0);
    const uc=l.unidad_compra||'ud';const f=l.factor!=null?l.factor:1;
    const cb=l.cantidad_base!=null?l.cantidad_base:(cc*f);const ub=l.unidad_base||uc;
    const conv=(f!==1)?`<span class="conv-chip">\u00d7${f}</span>`:'';
    rows+=`<tr><td><input id="a${idx}-an-${i}" value="${esc(l.descripcion||l.nombre||'')}"></td><td><input id="a${idx}-aq-${i}" type="number" step="0.001" value="${cc}" style="width:46px">${esc(uc)}</td><td><input id="a${idx}-af-${i}" type="number" step="0.001" value="${f}" style="width:44px"> ${conv}</td><td><input id="a${idx}-ab-${i}" type="number" step="0.001" value="${cb}" style="width:50px">${esc(ub)}</td></tr>`;
    rows+=`<tr style="display:none"><td colspan="4"><input id="a${idx}-au-${i}" value="${esc(uc)}"><input id="a${idx}-aub-${i}" value="${esc(ub)}"><input id="a${idx}-ap-${i}" value="${l.precio_unitario!=null?l.precio_unitario:''}"><input id="a${idx}-av-${i}" value="${l.iva_pct!=null?l.iva_pct:''}"></td></tr>`;
  });
  return `<div class="alb-card ready">${head}
    ${nom?`<div class="ac-detected">Proveedor detectado: <b>${esc(nom)}</b></div>`:''}
    <div class="ac-fields">
      <div class="fg"><label>Proveedor</label><select onchange="albQueue[${idx}].provId=this.value">${provOpts}</select></div>
      <div class="fg"><label>Fecha</label><input type="date" value="${item.fecha||hoy()}" onchange="albQueue[${idx}].fecha=this.value"></div>
    </div>
    <table class="alb-tbl"><tr><th>Producto</th><th>Compra</th><th>Conv.</th><th>Base</th></tr>${rows}</table>
  </div>`;
}

async function aplicarTodos(){
  const pend=albQueue.filter(x=>x.status==='ready');
  if(!pend.length)return;
  const btn=$('btn-alb-aplicar');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  let totalOK=0;
  for(let idx=0;idx<albQueue.length;idx++){
    const item=albQueue[idx];
    if(item.status!=='ready')continue;
    item.status='applying';renderCola();
    try{
      const n=aplicarUnoEnMemoria(item,idx);
      item.aplicados=n;item.status='done';totalOK+=n;
    }catch(e){item.status='error';item.error=e.message;}
    renderCola();
  }
  // Guardar una sola vez al final (más eficiente)
  try{await sbWrite('inventario',INV);llenarProveedores();}
  catch(e){$('alb-queue').insertAdjacentHTML('afterbegin',`<div class="alert alert-red">Error guardando: ${esc(e.message)}</div>`);}
  btn.disabled=false;btn.innerHTML='Aplicar a stock';
  actualizarApplyBar();
  // Mensaje resumen
  const hechos=albQueue.filter(x=>x.status==='done').length;
  if(hechos){$('alb-queue').insertAdjacentHTML('afterbegin',`<div class="alert alert-green" style="margin-bottom:12px">&#10003; ${hechos} ${hechos>1?'albaranes aplicados':'albarán aplicado'} &middot; ${totalOK} movimientos de stock. ¡Gracias!</div>`);}
}

/* Aplica un albarán al objeto INV en memoria (sin guardar). Devuelve nº de líneas aplicadas.
   Reusa exactamente la misma lógica que RESTAID. */
function aplicarUnoEnMemoria(item,idx){
  const p=item.parsed;let provId=item.provId||'';const fecha=item.fecha||hoy();
  if(!provId&&p.proveedor){
    const _pNom=typeof p.proveedor==='object'?p.proveedor.nombre:p.proveedor;
    const _pCif=typeof p.proveedor==='object'?p.proveedor.cif:null;
    const _pTel=typeof p.proveedor==='object'?p.proveedor.telefono:null;
    const _pCat=typeof p.proveedor==='object'?p.proveedor.categoria_sugerida:null;
    if(_pNom){let pv=INV.proveedores.find(x=>x.nombre.toLowerCase().includes(_pNom.toLowerCase().slice(0,8)));if(!pv&&_pCif)pv=INV.proveedores.find(x=>x.cif&&x.cif===_pCif);if(!pv){pv={id:uid(),nombre:_pNom,cif:_pCif||'',tel:_pTel||'',email:'',categoria:_pCat||'',dias:'',pago:'',notas:'Creado desde app personal'};INV.proveedores.push(pv);}provId=pv.id;}
  }
  const _ref=(p.documento&&p.documento.numero)||null;
  const lf=(p.lineas||[]).map((l,i)=>{
    const cantCompra=parseFloat($(`a${idx}-aq-${i}`)?.value)||0;
    const factor=parseFloat($(`a${idx}-af-${i}`)?.value)||1;
    const cantBase=parseFloat($(`a${idx}-ab-${i}`)?.value)||(cantCompra*factor);
    const precioCompra=parseFloat($(`a${idx}-ap-${i}`)?.value)||null;
    return {nombre:$(`a${idx}-an-${i}`)?.value||l.descripcion||l.nombre,cantidadCompra:cantCompra,unidadCompra:$(`a${idx}-au-${i}`)?.value||l.unidad_compra||'ud',factor,cantidad:Math.round(cantBase*1000)/1000,unidad:$(`a${idx}-aub-${i}`)?.value||l.unidad_base||'ud',precioCompra,precio:(precioCompra!=null&&factor>0)?Math.round(precioCompra/factor*1e4)/1e4:precioCompra,iva:parseFloat($(`a${idx}-av-${i}`)?.value)||l.iva_pct||null,lote:l.lote||null,categoria:l.categoria||null,caducidad:null};
  }).filter(l=>l.cantidad>0);
  lf.forEach(l=>{
    let ing=INV.ingredientes.find(x=>x.nombre.toLowerCase().includes(l.nombre.toLowerCase())||l.nombre.toLowerCase().includes(x.nombre.toLowerCase().split(' ')[0]));
    if(!ing){ing={id:uid(),nombre:l.nombre,categoria:l.categoria||'Otros',unidad:l.unidad||'ud',precio:l.precio||0,ivaPct:l.iva||null,stock:0,stockMin:0,proveedorId:provId||null,notas:'',creadoEn:fecha,historialPrecios:[],formatoCompra:l.unidadCompra!==l.unidad?{unidad:l.unidadCompra,factor:l.factor}:null};INV.ingredientes.push(ing);}
    if(l.precio&&l.precio>0){ing.precio=l.precio;if(provId)ing.proveedorId=provId;ing.historialPrecios=ing.historialPrecios||[];ing.historialPrecios.push({fecha,precio:l.precio,proveedorId:provId||ing.proveedorId,fuente:'albaran'});}
    if(l.iva!=null&&ing.ivaPct==null)ing.ivaPct=l.iva;
    if(l.categoria&&(!ing.categoria||ing.categoria==='Otros'))ing.categoria=l.categoria;
    if(l.unidadCompra!==l.unidad)ing.formatoCompra={unidad:l.unidadCompra,factor:l.factor};
    if(provId&&!ing.proveedorId)ing.proveedorId=provId;
    ing.stock=(ing.stock||0)+l.cantidad;
    INV.movimientos.push({id:uid(),ingId:ing.id,tipo:'entrada',cantidad:l.cantidad,unidad:l.unidad,cantidadCompra:l.cantidadCompra,unidadCompra:l.unidadCompra,factor:l.factor,fecha,coste:l.cantidadCompra*(l.precioCompra||0),motivo:'Albar\u00e1n '+(_ref||fecha),iva:l.iva||null});
    if(l.lote){INV.lotes=INV.lotes||[];INV.lotes.push({id:uid(),ingId:ing.id,cantidad:l.cantidad,lote:l.lote||null,caducidad:null,fecha});}
  });
  INV.albaranes.push({id:uid(),proveedorId:provId||null,fecha,ref:_ref,lineas:lf,totales:p.totales||null});
  return lf.length;
}

init();
</script>
