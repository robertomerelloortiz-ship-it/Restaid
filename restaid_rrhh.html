<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTAID · Personas & Turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --navy:#1A2B3C;--navy-mid:#243547;--navy-lt:#2E4259;
  --amber:#E8914A;--amber-dk:#C8712A;--amber-lt:#F5C49A;
  --bg:#F5F4F0;--surf:#FFFFFF;--surf-alt:#FAFAF8;
  --bdr:#E6E4DF;--bdr-strong:#CCC9C0;
  --tx:#1C2428;--tx2:#596570;--tx3:#98A3AC;
  --green:#1D7A4A;--green-bg:#E6F5EE;
  --red:#C03020;--red-bg:#FAECEA;
  --ylw:#B07010;--ylw-bg:#FBF5E0;
  --blue:#1A4A8A;--blue-bg:#EEF3FB;
  --sb:222px;--r:8px;--rsm:5px;--rlg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;overflow:hidden}
.sb-metric-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.sb-metric-pill.ok{background:rgba(29,122,74,.25);color:#7BE0A8}
.sb-metric-pill.warn{background:rgba(176,112,16,.25);color:#F0C868}
.sb-metric-pill.bad{background:rgba(192,48,32,.25);color:#F09080}
.sb-metric-pill.none{background:rgba(255,255,255,.1);color:rgba(255,255,255,.45)}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{background:var(--navy);flex-shrink:0;display:flex;flex-direction:column}
.tb-row1{display:flex;align-items:center;gap:12px;padding:0 20px;height:48px;border-bottom:1px solid rgba(255,255,255,.08)}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-logo-sq{width:24px;height:24px;background:var(--amber);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display';font-size:13px;color:#fff}
.tb-logo{font-family:'DM Serif Display';font-size:16px;color:#fff;letter-spacing:.01em}
.tb-module{font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em}
.tb-metric{margin-left:auto;display:flex;align-items:center;gap:9px}
.tb-metric-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em}
.tb-metric-val{font-family:'DM Serif Display';font-size:20px;line-height:1;color:#fff}
.btn-tb{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.14)}
.btn-tb:hover{background:rgba(255,255,255,.16);color:#fff}
#tabbar{display:flex;align-items:flex-end;padding:0 12px;height:38px;gap:2px;overflow-x:auto;scrollbar-width:none}
#tabbar::-webkit-scrollbar{display:none}
/* ── Vista móvil simplificada (contenedor oculto en escritorio) ── */
#mobile-view{display:none;padding-bottom:1.5rem}
.mb-week{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:.5rem .6rem;margin-bottom:1rem}
.mb-week button{width:34px;height:34px;border:1px solid var(--bdr-strong);background:var(--surf);border-radius:8px;font-size:17px;color:var(--tx2);cursor:pointer;flex-shrink:0;line-height:1}
.mb-week button:active{background:var(--bg)}
.mb-week span{flex:1;text-align:center;font-size:12.5px;font-weight:600;color:var(--tx)}
.mb-hero{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);padding:1.4rem 1.25rem;text-align:center;margin-bottom:1rem}
.mb-hero-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:.5rem}
.mb-hero-val{font-family:'DM Serif Display';font-size:40px;line-height:1;margin-bottom:.5rem}
.mb-pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:.4rem}
.mb-pill.ok{background:var(--green-bg);color:var(--green)}
.mb-pill.warn{background:var(--ylw-bg);color:var(--ylw)}
.mb-pill.bad{background:var(--red-bg);color:var(--red)}
.mb-hero-sub{font-size:12px;color:var(--tx3)}
.mb-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:1.4rem}
.mb-cell{background:var(--surf);padding:.95rem 1rem;text-align:center}
.mb-c-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:5px}
.mb-c-val{font-family:'DM Serif Display';font-size:21px;color:var(--tx);line-height:1}
.mb-section-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin:0 0 .6rem;padding-left:2px}
.mb-ins{display:flex;flex-direction:column;gap:8px;margin-bottom:1.4rem}
.mb-ins-row{background:var(--surf);border:1px solid var(--bdr);border-left:3px solid var(--amber);border-radius:var(--r);padding:.7rem .85rem;font-size:12.5px;line-height:1.5;color:var(--tx2)}
.mb-ins-row.good{border-left-color:var(--green)}
.mb-ins-row.warn{border-left-color:var(--ylw)}
.mb-ins-row b{color:var(--tx);font-weight:600}
.mb-days{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1.4rem;display:flex;flex-direction:column;gap:9px}
.mb-day{display:flex;align-items:center;gap:10px}
.mb-day-n{width:34px;font-size:12px;font-weight:600;color:var(--tx2);flex-shrink:0}
.mb-roles .mb-day-n{width:64px}
.mb-day-bar{flex:1;height:9px;background:var(--bg);border-radius:4px;overflow:hidden}
.mb-day-bar i{display:block;height:100%;background:var(--navy);border-radius:4px}
.mb-day-v{width:52px;text-align:right;font-size:11.5px;font-weight:600;color:var(--tx);flex-shrink:0}
.mb-empty{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rlg);padding:2.5rem 1.5rem;text-align:center}
.mb-empty .mb-e-ic{font-size:32px;opacity:.5;margin-bottom:.8rem}
.mb-empty h3{font-family:'DM Serif Display';font-size:19px;font-weight:400;margin-bottom:.5rem;color:var(--tx)}
.mb-empty p{font-size:12.5px;color:var(--tx2);line-height:1.6}
/* Selector de día */
.mb-daysel{display:flex;gap:5px;margin-bottom:1.1rem}
.mb-dc{flex:1;height:40px;border:1px solid var(--bdr-strong);background:var(--surf);border-radius:9px;font-size:13px;font-weight:700;color:var(--tx2);cursor:pointer;position:relative;font-family:'DM Sans',sans-serif}
.mb-dc.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
.mb-dc.today:not(.sel)::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--amber)}
.mb-dc.today.sel{box-shadow:0 0 0 2px var(--amber-lt)}
/* Turnos del día */
.mb-turnos{display:flex;flex-direction:column;gap:10px;margin-bottom:1.4rem}
.mb-turno{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:.85rem 1rem}
.mb-turno-hd{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--tx);margin-bottom:.5rem;padding-bottom:.5rem;border-bottom:1px solid var(--bg)}
.mb-turno-n{font-size:11px;font-weight:700;color:var(--tx3);background:var(--bg);border-radius:10px;padding:1px 9px;min-width:24px;text-align:center}
.mb-shift{display:flex;align-items:center;gap:8px;padding:6px 0}
.mb-shift+.mb-shift{border-top:1px solid var(--bg)}
.mb-shift-name{font-size:13px;font-weight:600;color:var(--tx);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-shift .emp-role-tag{flex-shrink:0}
.mb-shift-time{font-size:12px;font-weight:600;color:var(--tx2);flex-shrink:0;font-variant-numeric:tabular-nums}
.mb-none{font-size:12px;color:var(--tx3);padding:4px 0}
/* Esta semana */
.mb-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:1.4rem}
.mb-line-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);margin-bottom:.45rem}
.mb-line{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
.mb-line+.mb-line{border-top:1px solid var(--bg)}
.mb-line-name{font-weight:600;color:var(--tx)}
.mb-line-meta{margin-left:auto;font-size:12px;color:var(--tx2)}
.mb-tags{display:flex;flex-wrap:wrap;gap:6px}
.mb-tag{font-size:12px;font-weight:600;color:var(--tx2);background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:3px 11px}
.mb-ins-ic{margin-right:1px}
/* Coste al pie */
.mb-cost{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-left-width:3px;border-radius:var(--r);padding:.75rem .95rem}
.mb-cost-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mb-cost-lbl{font-size:12px;color:var(--tx2)}
.mb-cost-val{margin-left:auto;font-size:15px;font-weight:700}
.mb-cost-obj{font-size:11px;color:var(--tx3)}
@media(max-width:768px){
  /* Móvil simplificado: una sola pantalla vertical, sin tablas ni pestañas */
  #mobile-view{display:block}
  .page{display:none!important}
  #tabbar{display:none!important}
  .tb-row1{display:none!important}     /* el header del shell ya da logo/módulo/Copiloto */
  .mobile-hide{display:none!important}
  .tb-row1{padding:0 12px;height:auto;min-height:0}
  .tb-row1:empty{display:none}
  .tb-actions{margin-left:0!important;padding:6px 0}
  #tabbar{padding:0 8px;height:42px}
  .tab{font-size:13px;padding:0 11px}
  #content{padding:14px}
  input,select,textarea{font-size:16px!important}   /* evita el auto-zoom de iOS al enfocar */
  .tbl-wrap,table{overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* KPIs en grid de 2 columnas en vez de fila que se corta */
  [class*="kpi-row"],.kpi-grid{grid-template-columns:repeat(2,1fr)!important;overflow:visible!important}
  .grid-4,.grid-3{grid-template-columns:repeat(2,1fr)!important}
  .grid-2{grid-template-columns:1fr!important}
  .modal-box,[class*="modal"] .box{max-width:94vw!important;width:94vw!important;max-height:88vh!important}
}
.tab{display:flex;align-items:center;gap:6px;padding:0 14px;height:32px;border-radius:8px 8px 0 0;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;user-select:none;border:1px solid transparent;border-bottom:none}
.tab:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.06)}
.tab.active{background:var(--bg);color:var(--navy);border-color:rgba(255,255,255,.1);font-weight:600}
.tab-sep{width:1px;background:rgba(255,255,255,.1);height:18px;margin:0 4px;align-self:center}
.tb-title{font-family:'DM Serif Display';font-size:20px;color:var(--tx)}
.tb-sub{font-size:12px;color:var(--tx3);margin-left:6px;font-weight:400}
.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-mid)}
.btn-amber{background:var(--amber);color:#fff}.btn-amber:hover{background:var(--amber-dk)}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bdr-strong)}.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:5px 10px;font-size:11.5px}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--bdr-strong)}.btn-danger:hover{background:var(--red-bg);border-color:var(--red)}
.btn:disabled{opacity:.5;pointer-events:none}
#content{flex:1;overflow-y:auto;padding:28px}
/* Pages */
.page{display:none;animation:pgIn .25s ease}
.page.active{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:8px}
.page-hd h2{font-family:'DM Serif Display';font-size:22px;font-weight:400}
.page-hd p{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}
/* Empty state */
.empty{text-align:center;padding:3.5rem 2rem;color:var(--tx2)}
.empty-icon{font-size:34px;opacity:.5;margin-bottom:1rem}
.empty h3{font-family:'DM Serif Display';font-size:20px;font-weight:400;margin-bottom:.5rem;color:var(--tx)}
.empty p{font-size:13px;max-width:420px;margin:0 auto 1.25rem;line-height:1.7}
/* KPI */
.kpi-row{display:grid;gap:1px;background:var(--bdr);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:1.25rem}
.kpi-row-2{grid-template-columns:repeat(2,1fr)}.kpi-row-3{grid-template-columns:repeat(3,1fr)}.kpi-row-4{grid-template-columns:repeat(4,1fr)}
.kpi{background:var(--surf);padding:1.125rem}
.kpi-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:7px}
.kpi-val{font-family:'DM Serif Display';font-size:24px;color:var(--tx);line-height:1;margin-bottom:4px}
.kpi-sub{font-size:11px;color:var(--tx3)}
.kpi-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:4px}
.kpi-pill.ok{background:var(--green-bg);color:var(--green)}.kpi-pill.warn{background:var(--ylw-bg);color:var(--ylw)}.kpi-pill.bad{background:var(--red-bg);color:var(--red)}
/* Panels */
.panel{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:1.125rem 1.25rem;margin-bottom:1.25rem}
.panel-title{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:.35rem}
.panel-desc{font-size:11.5px;color:var(--tx3);margin-bottom:1rem;line-height:1.5;font-style:italic}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:1.25rem}
/* Insights */
.insights-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:1.25rem}
.insight{padding:.875rem 1rem;border-radius:var(--r);border-left:3px solid;background:var(--surf);border:1px solid var(--bdr)}
.insight.info{border-left-color:var(--navy)}
.insight.good{border-left-color:var(--green);background:var(--green-bg)}
.insight.warn{border-left-color:var(--ylw);background:var(--ylw-bg)}
.insight.opp{border-left-color:var(--blue);background:var(--blue-bg)}
.insight-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.insight.info .insight-lbl{color:var(--navy)}.insight.good .insight-lbl{color:var(--green)}.insight.warn .insight-lbl{color:var(--ylw)}.insight.opp .insight-lbl{color:var(--blue)}
.insight-txt{font-size:12px;color:var(--tx2);line-height:1.55}
/* Subtabs */
.subtabs{display:flex;gap:4px;background:var(--bg);padding:3px;border-radius:7px;width:fit-content;margin-bottom:1.125rem}
.subtab{padding:6px 14px;border-radius:5px;font-size:12.5px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .15s;border:none;font-family:'DM Sans',sans-serif}
.subtab.active{background:var(--surf);color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* Employee cards */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:1.25rem}
.emp-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:1.1rem 1.2rem;position:relative;transition:all .15s}
.emp-card:hover{border-color:var(--bdr-strong);box-shadow:0 2px 10px rgba(0,0,0,.04)}
.emp-card-top{display:flex;align-items:center;gap:11px;margin-bottom:.9rem}
.emp-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;font-family:'DM Serif Display';color:#fff}
.emp-card-name{font-size:15px;font-weight:600;line-height:1.2}
.emp-card-rol{font-size:11px;color:var(--tx3);margin-top:2px}
.emp-role-tag{display:inline-block;font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:9px;text-transform:uppercase;letter-spacing:.04em}
.role-sala{background:var(--blue-bg);color:var(--blue)}
.role-cocina{background:var(--green-bg);color:var(--green)}
.role-barra{background:var(--ylw-bg);color:var(--ylw)}
.role-office{background:#EEE;color:var(--tx2)}
.emp-card-stats{display:flex;flex-direction:column;gap:6px;padding-top:.85rem;border-top:1px solid var(--bdr)}
.emp-card-stat{display:flex;justify-content:space-between;font-size:12px}
.emp-card-stat span:first-child{color:var(--tx3)}
.emp-card-stat span:last-child{font-weight:600}
.emp-card-acts{display:flex;gap:6px;margin-top:.85rem}
.emp-card-acts .btn{flex:1;justify-content:center}
/* Forms */
.field{margin-bottom:.85rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--bdr-strong);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--tx);background:var(--surf)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--amber)}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-hint{font-size:10.5px;color:var(--tx3);margin-top:4px;line-height:1.4}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,43,60,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;backdrop-filter:blur(2px)}
.modal{background:var(--surf);border-radius:var(--rlg);padding:1.6rem 1.75rem;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal.wide{max-width:680px}
.modal h3{font-family:'DM Serif Display';font-size:21px;font-weight:400;margin-bottom:.35rem}
.modal-desc{font-size:12.5px;color:var(--tx2);margin-bottom:1.25rem;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap}
/* Cuadrante grid */
.cuad-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.1rem;flex-wrap:wrap}
.cuad-week{display:flex;align-items:center;gap:8px;background:var(--surf);border:1px solid var(--bdr);border-radius:7px;padding:5px 8px}
.cuad-week button{background:transparent;border:none;cursor:pointer;font-size:16px;color:var(--tx2);padding:2px 7px;border-radius:5px}
.cuad-week button:hover{background:var(--bg)}
.cuad-week-lbl{font-size:12.5px;font-weight:600;min-width:148px;text-align:center}
.cuad-scroll{overflow-x:auto;border:1px solid var(--bdr);border-radius:var(--r);background:var(--surf)}
.cuad-table{width:100%;border-collapse:collapse;min-width:760px;table-layout:fixed}
.cuad-table th,.cuad-table td{border:1px solid var(--bg);padding:0;text-align:center;vertical-align:top}
.cuad-table thead th{background:var(--surf-alt);font-size:11px;font-weight:600;color:var(--tx2);padding:9px 6px;position:sticky;top:0}
.cuad-table thead th.today{background:#fef4ec;color:var(--amber-dk)}
.cuad-emp-cell{text-align:left;padding:9px 11px!important;background:var(--surf-alt);min-width:148px;position:sticky;left:0;z-index:2}
.cuad-emp-name{font-size:12.5px;font-weight:600}
.cuad-emp-sub{font-size:10px;color:var(--tx3);margin-top:1px}
.cuad-cell{min-width:88px;padding:5px!important;cursor:pointer;transition:background .12s}
.cuad-cell:hover{background:#fef8f2}
.cuad-chip{display:block;font-size:10.5px;font-weight:600;padding:3px 6px;border-radius:5px;margin-bottom:3px;line-height:1.3}
.cuad-chip.comida{background:var(--green-bg);color:var(--green)}
.cuad-chip.cena{background:var(--blue-bg);color:var(--blue)}
.cuad-chip-empty{font-size:16px;color:var(--bdr-strong);font-weight:400}
.cuad-live{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;padding:2px 5px;border-radius:5px;margin-top:2px;background:rgba(29,122,74,.12);color:var(--green);border:1px solid rgba(29,122,74,.3)}
.cuad-live.fuera{background:rgba(89,101,112,.1);color:var(--tx2);border-color:rgba(89,101,112,.25)}
.cuad-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:livePulse 1.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(29,122,74,.5)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(29,122,74,0)}}
.cuad-live-clock{margin-left:auto;font-weight:600;opacity:.85}
.cuad-now{display:flex;align-items:center;flex-wrap:wrap;gap:8px;background:var(--green-bg);border:1px solid rgba(29,122,74,.3);border-radius:var(--r);padding:.6rem .85rem;margin-bottom:.85rem}
.cuad-now-hd{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
.cuad-now-empty{font-size:12px;color:var(--tx3)}
.cuad-now-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surf);border:1px solid rgba(29,122,74,.25);border-radius:14px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--tx)}
.cuad-now-pill .cuad-live-dot{width:6px;height:6px}
.cuad-now-pill small{color:var(--tx3);font-weight:500}
.cuad-total-real{font-size:9.5px;font-weight:700;color:var(--green);margin-top:2px}
.cuad-extra-tag{display:inline-block;background:var(--ylw-bg);color:var(--ylw);font-weight:700;padding:0 5px;border-radius:7px;font-size:9px}
.extra-auto-tag{display:inline-block;background:var(--blue-bg);color:var(--blue);font-weight:700;padding:1px 6px;border-radius:7px;font-size:9px;margin-left:6px;vertical-align:middle;letter-spacing:.03em}
.cuad-total-cell{background:var(--surf-alt);font-size:11.5px;min-width:92px;padding:9px 8px!important}
.cuad-total-h{font-weight:700;font-size:13px}
.cuad-total-sub{font-size:10px;color:var(--tx3);margin-top:1px}
.cuad-foot td{background:var(--navy);color:#fff;padding:9px 6px!important;font-size:11px;border-color:var(--navy-lt)}
.cuad-foot .cuad-emp-cell{background:var(--navy);color:#fff}
.cuad-foot-val{font-weight:700;font-size:13px}
.cuad-foot-pct{font-size:10px;margin-top:1px;opacity:.8}
.cuad-pct-ok{color:#7BE0A8}.cuad-pct-warn{color:#F0C868}.cuad-pct-bad{color:#F09080}
.cuad-over{background:rgba(192,48,32,.25)!important}
/* Cost table */
.ct-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ct-table th{padding:8px 11px;color:var(--tx3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em;text-align:right;border-bottom:1px solid var(--bdr)}
.ct-table th:first-child{text-align:left}
.ct-table td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--bg)}
.ct-table td:first-child{text-align:left;font-weight:600}
.ct-table tr:last-child td{border-bottom:none}
.ct-pct{display:inline-block;padding:2px 9px;border-radius:5px;font-weight:700;font-size:11.5px}
.ct-pct.ok{background:var(--green-bg);color:var(--green)}.ct-pct.warn{background:var(--ylw-bg);color:var(--ylw)}.ct-pct.bad{background:var(--red-bg);color:var(--red)}
/* Gauge */
.gauge-wrap{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.gauge{position:relative;width:150px;height:150px;flex-shrink:0}
.gauge svg{transform:rotate(-90deg)}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-val{font-family:'DM Serif Display';font-size:30px;line-height:1}
.gauge-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.gauge-legend{flex:1;min-width:200px}
.gauge-leg-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:4px 0}
.gauge-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Rank rows */
.rank-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--bg)}
.rank-item:last-child{border-bottom:none}
.rank-label{flex:1;font-size:12.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-bar-wrap{width:60px;height:4px;background:var(--bg);border-radius:2px;flex-shrink:0}
.rank-bar{height:4px;border-radius:2px}
.rank-val{font-size:12.5px;font-weight:600;text-align:right;flex-shrink:0;min-width:78px}
/* Extras */
.extra-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.extra-row:last-child{border-bottom:none}
.extra-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'DM Serif Display';color:#fff}
.extra-info{flex:1;min-width:0}
.extra-name{font-size:13px;font-weight:600}
.extra-meta{font-size:11px;color:var(--tx3);margin-top:1px}
.extra-hours{font-family:'DM Serif Display';font-size:18px;text-align:right;min-width:60px}
.extra-state{font-size:10px;font-weight:600;padding:2px 9px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}
.state-pendiente{background:var(--ylw-bg);color:var(--ylw)}
.state-compensada{background:var(--green-bg);color:var(--green)}
.state-pagada{background:var(--blue-bg);color:var(--blue)}
/* Personas */
.pers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.pers-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:1.15rem 1.25rem}
.pers-card-top{display:flex;align-items:center;gap:11px;margin-bottom:.9rem}
.pers-name{font-size:14px;font-weight:600}
.pers-tenure{font-size:11px;color:var(--tx3);margin-top:1px}
.pers-block{margin-bottom:.75rem}
.pers-block-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:4px}
.pers-block-val{font-size:12.5px;color:var(--tx2);line-height:1.5}
.pers-skills{display:flex;flex-wrap:wrap;gap:5px}
.pers-skill{font-size:10.5px;background:var(--bg);border:1px solid var(--bdr);padding:2px 9px;border-radius:11px;color:var(--tx2)}
.pers-celebrate{background:linear-gradient(135deg,#fef4ec,#fdeee0);border:1px solid var(--amber-lt);border-radius:var(--r);padding:1rem 1.2rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:14px}
.pers-celebrate-icon{font-size:26px;flex-shrink:0}
.pers-celebrate-txt{font-size:12.5px;color:var(--tx);line-height:1.55}
.pers-celebrate-txt strong{color:var(--amber-dk)}
/* AI guided panel */
.aiguide{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.aiguide-step{margin-bottom:1.25rem}
.aiguide-step-lbl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;margin-bottom:.65rem}
.aiguide-step-n{width:20px;height:20px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sales-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.sales-day{text-align:center}
.sales-day-lbl{font-size:10px;color:var(--tx3);margin-bottom:4px;font-weight:600}
.sales-day input{width:100%;padding:6px 4px;border:1px solid var(--bdr-strong);border-radius:5px;font-size:11.5px;text-align:center;font-family:'DM Sans',sans-serif;margin-bottom:4px}
.sales-day input:focus{outline:none;border-color:var(--amber)}
.sales-day .lbl-c{font-size:8.5px;color:var(--green);font-weight:600}
.sales-day .lbl-n{font-size:8.5px;color:var(--blue);font-weight:600}
/* Chat IA */
.ia-wrap{display:flex;flex-direction:column;height:calc(100vh - 58px - 56px);max-height:760px}
.ia-messages{flex:1;overflow-y:auto;padding:.5rem 0 1rem;display:flex;flex-direction:column;gap:14px}
.ia-msg{display:flex;gap:10px;max-width:82%}
.ia-msg.user{align-self:flex-end;flex-direction:row-reverse}
.ia-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Serif Display'}
.ia-msg.bot .ia-avatar{background:var(--navy);color:#fff}
.ia-msg.user .ia-avatar{background:var(--amber);color:#fff}
.ia-bubble{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:.7rem 1rem;font-size:13px;line-height:1.6}
.ia-msg.user .ia-bubble{background:var(--navy);color:#fff;border-color:var(--navy)}
.ia-bubble h3{font-size:14px;font-family:'DM Serif Display';font-weight:400;margin:.5rem 0 .3rem}
.ia-bubble h4{font-size:12.5px;font-weight:700;margin:.5rem 0 .25rem}
.ia-bubble p{margin:.35rem 0}.ia-bubble p:first-child{margin-top:0}.ia-bubble p:last-child{margin-bottom:0}
.ia-bubble ul{margin:.35rem 0;padding-left:1.1rem}.ia-bubble li{margin:.2rem 0}
.ia-bubble strong{font-weight:600}
.ia-error{color:var(--red);font-size:12.5px;line-height:1.5}
.ia-typing{display:flex;gap:4px;padding:3px 0}
.ia-typing span{width:7px;height:7px;border-radius:50%;background:var(--tx3);animation:iaBlink 1.2s infinite}
.ia-typing span:nth-child(2){animation-delay:.2s}.ia-typing span:nth-child(3){animation-delay:.4s}
@keyframes iaBlink{0%,60%,100%{opacity:.25}30%{opacity:1}}
.ia-suggest{display:flex;flex-wrap:wrap;gap:7px;margin:.5rem 0 1rem}
.ia-chip{font-size:11.5px;padding:6px 12px;border-radius:16px;background:var(--surf);border:1px solid var(--bdr-strong);color:var(--tx2);cursor:pointer;transition:all .15s}
.ia-chip:hover{border-color:var(--amber);color:var(--amber-dk);background:#fef8f2}
.ia-input-row{display:flex;gap:9px;padding-top:.85rem;border-top:1px solid var(--bdr)}
.ia-input{flex:1;padding:10px 14px;border:1px solid var(--bdr-strong);border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;resize:none;height:44px}
.ia-input:focus{outline:none;border-color:var(--amber)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:.875rem 1.5rem;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:200;animation:tIn .25s ease}
@keyframes tIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
.ai-hint{background:var(--ylw-bg);border:1px solid #e8d070;border-radius:6px;padding:.6rem .8rem;font-size:11.5px;color:var(--ylw);line-height:1.5;margin-bottom:1rem}
/* Voice */
.btn-mic{width:44px;height:44px;border-radius:50%;background:var(--surf);border:1.5px solid var(--bdr-strong);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;position:relative}
.btn-mic:hover{border-color:var(--amber);background:#fef8f2}
.btn-mic.recording{background:var(--red);border-color:var(--red);animation:micPulse 1.4s infinite}
.btn-mic.recording svg{stroke:#fff}
.btn-mic svg{width:18px;height:18px;stroke:var(--tx2);fill:none;stroke-width:2}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(192,48,32,.4)}50%{box-shadow:0 0 0 10px rgba(192,48,32,0)}}
.voice-lang{font-size:9px;color:var(--tx3);text-align:center;margin-top:3px;letter-spacing:.04em}
.voice-hint{font-size:10.5px;color:var(--tx3);text-align:center;padding:3px 0;animation:fadeHint .3s ease}
@keyframes fadeHint{from{opacity:0}to{opacity:1}}
/* Action confirmation */
.ia-action-bar{display:flex;align-items:center;gap:9px;background:var(--green-bg);border:1px solid #b5dfc8;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:12px;color:var(--green);animation:actIn .25s ease}
.ia-action-bar.pending{background:var(--ylw-bg);border-color:#e8d070;color:var(--ylw)}
@keyframes actIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ia-action-icon{font-size:16px;flex-shrink:0}
.ia-action-txt{flex:1;line-height:1.45}
.ia-action-btns{display:flex;gap:5px;flex-shrink:0}
.ia-action-btns .btn{font-size:11px;padding:4px 10px}
/* Cuadrante secciones */
.cuad-section-hd{background:var(--navy);color:#fff;padding:7px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.cuad-section-hd .count-badge{background:rgba(255,255,255,.15);padding:1px 7px;border-radius:9px;font-size:10px;font-weight:600}
.cuad-staff{font-size:9.5px;font-weight:700;padding:4px 6px!important;text-align:center}
.cuad-staff-ok{color:var(--green);background:var(--green-bg)}
.cuad-staff-warn{color:var(--ylw);background:var(--ylw-bg)}
.cuad-staff-bad{color:var(--red);background:var(--red-bg)}
/* Pasivo laboral */
.pasivo-bar{display:flex;align-items:center;gap:6px;margin-top:4px}
.pasivo-bar-fill{height:3px;border-radius:2px;background:var(--amber)}
.pasivo-tag{font-size:10px;padding:1px 7px;border-radius:9px;background:var(--ylw-bg);color:var(--ylw);font-weight:600}
/* Avatar con imagen */
.emp-av-img{width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0}
.img-upload-wrap{position:relative;cursor:pointer;display:inline-block}
.img-upload-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-placeholder{width:80px;height:80px;border-radius:50%;background:var(--bg);border:2px dashed var(--bdr-strong);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3);text-align:center;padding:8px}
.img-upload-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--bdr)}
/* Vacaciones */
.vac-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.vac-saldo{margin-top:4px}
.vac-saldo-nums{display:flex;align-items:baseline;gap:6px}
.vac-saldo-big{font-size:1.5rem;font-weight:800;color:var(--green);line-height:1}
.vac-saldo-unit{font-size:11.5px;color:var(--tx2)}
.vac-bar{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;margin:6px 0 4px}
.vac-bar-fill{height:100%;background:var(--amber);border-radius:4px;transition:width .3s}
.vac-saldo-foot{font-size:11px;color:var(--tx3)}
.modal-vac-saldo{font-size:12.5px;color:var(--tx2);background:var(--bg);border-radius:6px;padding:7px 10px;margin-bottom:.7rem}
.modal-vac-saldo b{color:var(--green);font-size:14px}
.vac-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 8px;background:var(--bg);border-radius:6px}
.vac-dates{font-weight:600;flex-shrink:0}.vac-motivo{color:var(--tx2);flex:1}
.vac-row .btn{flex-shrink:0}
/* Structured personal */
.pers-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.pers-info-item{font-size:12px;padding:4px 0}.pers-info-item .pers-info-k{font-size:9.5px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;font-weight:600}.pers-info-item .pers-info-v{margin-top:1px;color:var(--tx2)}
/* Salary preview */
.salary-preview{background:var(--bg);border-radius:6px;padding:8px 10px;margin-top:6px;font-size:11.5px;color:var(--tx2);display:flex;gap:14px;flex-wrap:wrap}
.salary-preview strong{color:var(--tx);font-weight:700}

.tb-copilot-btn{display:flex;align-items:center;gap:7px;padding:6px 14px;background:var(--navy,#1e293b);color:#fff;border:none;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:background .15s}
.tb-copilot-btn:hover{background:#334155}
.tb-copilot-btn .pulse-dot{width:7px;height:7px;border-radius:50%;background:#E8914A;animation:pulse-ring 2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

/* ── Fichaje / registro de jornada ── */
.fich-warn{background:#FFF7ED;border:1px solid #FED7AA;color:#9A3412;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.fich-grid{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.fich-pad{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.fich-pad-title{text-align:center;font-size:13px;color:var(--tx2);margin-bottom:14px}
.fich-dots{display:flex;gap:10px;justify-content:center;margin-bottom:6px;min-height:16px}
.fich-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--tx3);box-sizing:border-box}
.fich-dot.on{background:var(--navy);border-color:var(--navy)}
.fich-err{color:var(--red);text-align:center;font-size:12px;min-height:18px;margin-bottom:6px}
.fich-err-sp{min-height:18px;margin-bottom:6px}
.fich-keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fich-key{aspect-ratio:1/1;border:1px solid var(--bdr);background:var(--bg);border-radius:12px;font-size:22px;font-weight:600;color:var(--tx);cursor:pointer;font-family:inherit;transition:transform .08s,background .08s}
.fich-key:active{transform:scale(.95);background:var(--navy);color:#fff}
.fich-key-fn{font-size:18px;color:var(--tx2)}
.fich-key-ok{background:var(--amber);color:#fff;border-color:var(--amber);font-size:24px}
.fich-done{text-align:center;padding:22px 14px}
.fich-done-ic{font-size:40px}
.fich-done-name{font-size:20px;font-weight:700;margin-top:6px;color:var(--tx)}
.fich-done-tx{font-size:14px;color:var(--tx2);margin-top:4px}
.fich-done-sub{font-size:13px;color:var(--tx3);margin:6px 0 14px}
.fich-done.in .fich-done-name{color:#16A34A}
.fich-done.out .fich-done-name{color:var(--red)}
.fich-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.fich-card-h{font-family:var(--ff-head,inherit);font-weight:600;font-size:15px;margin-bottom:10px;text-transform:capitalize}
.fich-tag{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600}
.fich-tag.in{background:#DCFCE7;color:#166534}
.fich-tag.out{background:#F1F5F9;color:#475569}
.fich-up{color:var(--red);font-weight:600}
.fich-down{color:#D97706;font-weight:600}
.fich-edit{display:inline-block;cursor:pointer;color:var(--tx2);border:1px solid var(--bdr);border-radius:6px;padding:1px 7px;transition:all .12s}
.fich-edit:hover{border-color:var(--amber);color:var(--amber);background:var(--ylw-bg)}
.fich-add{cursor:pointer;border:1px dashed var(--bdr-strong);background:none;color:var(--tx3);border-radius:6px;width:22px;height:22px;font-size:14px;line-height:1;vertical-align:middle}
.fich-add:hover{border-color:var(--green);color:var(--green)}
.fich-empty{color:var(--tx3);font-size:13px;margin:4px 0 0}
.fich-note{font-size:11.5px;color:var(--tx3);margin:8px 0 0}
@media(max-width:768px){ .fich-grid{grid-template-columns:1fr} }


/* Fichaje en móvil */
.mb-fichaje{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;margin-bottom:1.4rem;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.mb-fx-hd{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;margin-bottom:10px}

<div id="modal-host"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   RESTAID CORE · shim compartido
═══════════════════════════════════════════════════════════════════ */
window.RESTAID=window.RESTAID||(function(){const l={};return{version:'3.0',config:{},data:{},ventas:null,modules:{},register(n,m){this.modules[n]=m;return m;},on(e,c){(l[e]=l[e]||[]).push(c);},emit(e,p){(l[e]||[]).forEach(c=>{try{c(p);}catch(x){console.error(x);}});}};})();

const API_URL='/api/claude';
// Modelo de IA — uno de los 4 puntos a editar al cambiar de versión
// (ventas, rrhh, inventario, shell deben coincidir).
const MODEL='claude-haiku-4-5';
/* ── IA: cabeceras con la contraseña de sesión (la misma del login) ── */
function aiHeaders(){
  const h={'Content-Type':'application/json'};
  let p='';try{p=localStorage.getItem('restaid_pass')||'';}catch(e){}
  if(p){h['x-restaid-pass']=p;}
  return h;
}
function aiKeyHint(){
  let p='';try{p=localStorage.getItem('restaid_pass')||'';}catch(e){}
  return p?'Error de conexión con la IA. Reintenta en unos segundos.':'Sesión no iniciada: vuelve a entrar en RESTAID.';
}

const DIAS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DIAS_FULL=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const TURNOS=['Comida','Cena'];
const ROLES=['Sala','Cocina','Barra','Office'];
const AVCOLORS=['#1A2B3C','#2E4259','#E8914A','#5A8A6A','#8A5A2A','#2A6A8A','#6A2A8A','#8A6A2A','#1A4A8A','#1D7A4A'];

const $=id=>document.getElementById(id);
const $$=s=>Array.from(document.querySelectorAll(s));
const fc=(n,d=2)=>(Number(n)||0).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});
const fk=n=>n>=1000?(n/1000).toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'k':fc(n,0);
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let TOAST_T=null;
function toast(msg){const ex=$('rrhh-toast');if(ex)ex.remove();const d=document.createElement('div');d.className='toast';d.id='rrhh-toast';d.textContent=msg;document.body.appendChild(d);clearTimeout(TOAST_T);TOAST_T=setTimeout(()=>d.remove(),2800);}

/* ── Persistencia ──────────────────────────────────── */
const STORE='restaid_rrhh_v1';
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'restaid_pass' && e.data.pass) {
    try { localStorage.setItem('restaid_pass', e.data.pass); } catch(err) {}
  }
  if (e.data && e.data.type === 'restaid_request_pub') {
    try { if (typeof DB !== 'undefined' && DB) window.parent.postMessage({type:'restaid_pub',key:STORE,value:JSON.stringify(DB)},'*'); } catch(err) {}
  }
});
function defaultDB(){return{empleados:[],semanas:{},fichajes:[],config:{targetPct:30,ssMult:1.32,premiumExtra:1.5,ticketMedio:18,ratioSala:25,ratioCocina:30},semanaActual:null};}
function loadDB(){try{const s=localStorage.getItem(STORE);if(!s)return defaultDB();const d=JSON.parse(s);return{...defaultDB(),...d,config:{...defaultDB().config,...(d.config||{})}};}catch(e){return defaultDB();}}
let LOCAL_DIRTY=false;
function saveDB(){LOCAL_DIRTY=true;DB._ts=Date.now();try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){console.error('No se pudo guardar',e);}try{window.parent.postMessage({type:'restaid_pub',key:STORE,value:JSON.stringify(DB)},'*');}catch(e){}publishCore();sbSetRRHH();}
let DB=loadDB();

/* ── Supabase (mismo proyecto que Inventario/Ventas) ──────────────
   Tabla: rrhh (restaurante text, datos jsonb)
   Lectura al arrancar; escritura en segundo plano con debounce para
   no saturar al editar el cuadrante celda a celda. */
const SB_URL='https://gtdsqvebuhdndfaiqoyj.supabase.co';
const SB_KEY='sb_publishable_cu53L_4O6Rz-RlGurDI3Kg_CJHqaa8U';
const SB_RESTAURANTE='default';
const SB_TABLE='rrhh';

async function sbGetRRHH(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?restaurante=eq.${SB_RESTAURANTE}&select=datos`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!r.ok)return null;
    const d=await r.json();
    return d&&d[0]?d[0].datos:null;
  }catch(e){return null;}
}

let SB_TIMER=null;
function sbSetRRHH(){
  // Debounce: agrupa ráfagas de guardado (edición del cuadrante) en una sola escritura
  clearTimeout(SB_TIMER);
  SB_TIMER=setTimeout(sbWriteNow,1500);
}
async function sbWriteNow(){
  // Upsert robusto: PATCH si la fila existe; si no actualizó nada, INSERT
  try{
    const rPatch=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?restaurante=eq.${SB_RESTAURANTE}`,{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body:JSON.stringify({datos:DB})
    });
    const patchTxt=await rPatch.text().catch(()=>'');
    let patched=[];try{patched=JSON.parse(patchTxt);}catch(e){}
    if(Array.isArray(patched)&&patched.length===0){
      const rPost=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({restaurante:SB_RESTAURANTE,datos:DB})
      });
      if(!rPost.ok){const t=await rPost.text().catch(()=>'');console.warn('SB rrhh insert error',rPost.status,t.slice(0,150));}
    }
  }catch(e){console.warn('SB rrhh write error',e);}
}

async function loadFromDB(){
  // Supabase al arrancar, con protección contra carreras:
  //  - si el usuario ya guardó algo en esta sesión (LOCAL_DIRTY), lo local manda
  //  - si lo local tiene un timestamp más reciente que lo remoto, lo local manda
  const remote=await sbGetRRHH();
  if(!remote||typeof remote!=='object')return;
  if(LOCAL_DIRTY){console.log('[RESTAID rrhh] Remoto ignorado: hay cambios locales de esta sesión');return;}
  const remoteTs=Number(remote._ts)||0,localTs=Number(DB._ts)||0;
  if(remoteTs<localTs){console.log('[RESTAID rrhh] Remoto ignorado: lo local es más reciente');return;}
  DB={...defaultDB(),...remote,config:{...defaultDB().config,...(remote.config||{})}};
  if(sanitizeDB()){console.log('[RESTAID rrhh] Datos remotos reparados, subiendo versión corregida');sbSetRRHH();}
  try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){}
  publishCore();updateSidebar();
  const act=document.querySelector('.tab[data-page].active');
  showPage(act&&act.dataset.page?act.dataset.page:'resumen');
  console.log('[RESTAID rrhh] Datos cargados desde Supabase');
}

/* ── Helpers de empleados ──────────────────────────── */
function emp(id){return DB.empleados.find(e=>e.id===id);}
function empColor(id){const i=DB.empleados.findIndex(e=>e.id===id);return AVCOLORS[(i<0?0:i)%AVCOLORS.length];}
function initials(name){return(name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}
function roleClass(r){return'role-'+(r||'office').toLowerCase();}
function calcSalarioHora(e){const hSem=Number(e.horasContrato)||40;const mes=Number(e.salarioBrutoMes)||0;return mes>0?mes/(hSem*4.33):Number(e.salarioHora)||0;}
function calcPasivoLaboral(e){
  if(!e.fechaAlta)return 0;
  const dias=Math.max(0,(new Date()-new Date(e.fechaAlta))/86400000);
  const anos=dias/365.25;
  const salDiario=(Number(e.salarioBrutoMes)||calcSalarioHora(e)*(Number(e.horasContrato)||40)*4.33)*12/365;
  let indemnizacion=salDiario*33*anos; // 33 días/año para indefinidos post-2012
  const tope=Number(e.salarioBrutoMes||0)*24;
  if(tope>0)indemnizacion=Math.min(indemnizacion,tope);
  return Math.max(0,indemnizacion);
}
function empAvatar(e,size){
  if(e.imagen)return`<img class="emp-av-img" style="width:${size||42}px;height:${size||42}px" src="${e.imagen}" alt="${esc(e.nombre)}">`;
  return`<div class="emp-av" style="background:${empColor(e.id)};width:${size||42}px;height:${size||42}px;font-size:${(size||42)*0.36}px">${esc(initials(e.nombre))}</div>`;
}

/* ── Helpers de semana (ISO) ───────────────────────── */
function isoWeekId(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const yStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));const wk=Math.ceil((((d-yStart)/86400000)+1)/7);return d.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function mondayOf(date){const d=new Date(date);const day=(d.getDay()||7)-1;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
function weekIdToMonday(wid){if(!wid||!/^\d{4}-W\d{2}$/.test(String(wid)))wid=isoWeekId(new Date());const[y,w]=wid.split('-W').map(Number);const simple=new Date(Date.UTC(y,0,1+(w-1)*7));const dow=simple.getUTCDay();const monday=new Date(simple);if(dow<=4)monday.setUTCDate(simple.getUTCDate()-dow+1);else monday.setUTCDate(simple.getUTCDate()+8-dow);return monday;}
function weekLabel(wid){const m=weekIdToMonday(wid);const sun=new Date(m);sun.setUTCDate(m.getUTCDate()+6);const fmt=d=>d.getUTCDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getUTCMonth()];return fmt(m)+' – '+fmt(sun);}
function shiftWeek(wid,delta){const m=weekIdToMonday(wid);m.setUTCDate(m.getUTCDate()+delta*7);return isoWeekId(new Date(m.getUTCFullYear(),m.getUTCMonth(),m.getUTCDate()));}

/* Sanitiza la DB tras CUALQUIER carga (localStorage o Supabase).
   Repara semanaActual inválida y migra semanas guardadas bajo claves
   corruptas ('null'/'undefined') conservando los turnos del usuario. */
function sanitizeDB(){
  let changed=false;
  if(!DB.semanaActual||!/^\d{4}-W\d{2}$/.test(String(DB.semanaActual))){DB.semanaActual=isoWeekId(new Date());changed=true;}
  if(!DB.semanas||typeof DB.semanas!=='object'){DB.semanas={};changed=true;}
  ['null','undefined'].forEach(bad=>{
    if(DB.semanas[bad]){
      const cur=DB.semanas[DB.semanaActual];
      if(!cur||!((cur.asignaciones||[]).length)){DB.semanas[DB.semanaActual]=DB.semanas[bad];}
      delete DB.semanas[bad];changed=true;
    }
  });
  return changed;
}
sanitizeDB();
(function(){const pv=pubVentas();if(pv&&pv.ticketMedio>0&&!DB.config.ticketMedioManual){const t=Math.round(pv.ticketMedio*100)/100;if(Math.abs((DB.config.ticketMedio||0)-t)>0.01){DB.config.ticketMedio=t;try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){}console.log('[RESTAID rrhh] Ticket medio actualizado con el real de Ventas: '+t+'€');}}})();
/* ── Vínculo Ventas → RRHH: previsión automática de ventas ──────────
   Ventas publica en restaid_pub_v1 las medias reales por día y turno.
   Las semanas nuevas del cuadrante se rellenan solas con ese histórico
   (marcadas como auto); el gestor puede sobrescribirlas cuando quiera. */
function pubVentas(){
  try{const p=JSON.parse(localStorage.getItem('restaid_pub_v1')||'null');return p&&p.ventas&&p.ventas.prevSemana?p.ventas:null;}catch(e){return null;}
}
function prefillVentas(w){
  const pv=pubVentas();if(!pv)return false;
  let n=0;DIAS.forEach(d=>{const v=pv.prevSemana[d];if(v&&(v.Comida||v.Cena)){w.ventas[d]={Comida:Number(v.Comida)||0,Cena:Number(v.Cena)||0};n++;}});
  if(n>0){w.ventasAuto=true;return true;}
  return false;
}
function curWeek(){const wid=DB.semanaActual;let nueva=false;if(!DB.semanas[wid]){DB.semanas[wid]={ventas:{},asignaciones:[],extras:[]};nueva=true;}const w=DB.semanas[wid];if(!w.ventas)w.ventas={};if(!w.asignaciones)w.asignaciones=[];if(!w.extras)w.extras=[];if((nueva||Object.keys(w.ventas).length===0)&&!w.ventasEditadas){if(prefillVentas(w)){try{localStorage.setItem(STORE,JSON.stringify(DB));}catch(e){}}}return w;}

/* ── Cálculo de horas y coste ──────────────────────── */
function parseHM(s){if(!s)return null;const m=String(s).match(/^(\d{1,2}):?(\d{2})?$/);if(!m)return null;return parseInt(m[1])+(m[2]?parseInt(m[2])/60:0);}
function asignHoras(a){let ini=parseHM(a.ini),fin=parseHM(a.fin);if(ini==null||fin==null)return 0;if(fin<=ini)fin+=24;return Math.max(0,fin-ini);}
function asignCoste(a){const e=emp(a.empId);if(!e)return 0;return asignHoras(a)*calcSalarioHora(e)*(DB.config.ssMult||1);}
function ventasSemana(w){let t=0;DIAS.forEach(d=>{const v=w.ventas[d]||{};t+=(Number(v.Comida)||0)+(Number(v.Cena)||0);});return t;}
function ventasDia(w,d){const v=w.ventas[d]||{};return(Number(v.Comida)||0)+(Number(v.Cena)||0);}
function ventasTurno(w,d,t){const v=w.ventas[d]||{};return Number(v[t])||0;}
function costeSemana(w){return w.asignaciones.reduce((s,a)=>s+asignCoste(a),0);}
function costeDia(w,d){return w.asignaciones.filter(a=>a.dia===d).reduce((s,a)=>s+asignCoste(a),0);}
function horasEmpSemana(w,empId){return w.asignaciones.filter(a=>a.empId===empId).reduce((s,a)=>s+asignHoras(a),0);}
function pctClass(pct){if(pct==null||!isFinite(pct))return'none';const t=DB.config.targetPct||30;if(pct<=t-2)return'ok';if(pct<=t+5)return'warn';return'bad';}
/* Dotación: ¿cuántas personas del rol hay asignadas en día+turno? */
function staffCount(w,dia,turno,rol){return w.asignaciones.filter(a=>a.dia===dia&&a.turno===turno&&(()=>{const e=emp(a.empId);return e&&e.rol===rol;})()).length;}
function staffNeeded(w,dia,turno,rol){const vt=ventasTurno(w,dia,turno);if(vt<=0)return 0;const comensales=vt/(DB.config.ticketMedio||18);const ratio=rol==='Sala'?DB.config.ratioSala||25:DB.config.ratioCocina||30;return Math.max(1,Math.ceil(comensales/ratio));}

/* ── Publicar al core para otros módulos ───────────── */
function publishCore(){const w=DB.semanas[DB.semanaActual];RESTAID.rrhh={empleados:DB.empleados,config:DB.config,semanaActual:DB.semanaActual,costeSemana:w?costeSemana(w):0,ventasSemana:w?ventasSemana(w):0};RESTAID.emit&&RESTAID.emit('rrhh:ready',RESTAID.rrhh);
  // Publicación cross-módulo: el shell calcula el prime cost con esto
  try{
    const cs=w?costeSemana(w):0,vs=w?ventasSemana(w):0;
    let pub={};try{pub=JSON.parse(localStorage.getItem('restaid_pub_v1')||'{}')||{};}catch(e){}
    pub.rrhh={costeSemana:Math.round(cs),ventasSemana:Math.round(vs),pctLaboral:vs>0?Math.round(cs/vs*1000)/10:null,empleados:DB.empleados.length,semana:DB.semanaActual,_ts:Date.now()};
    localStorage.setItem('restaid_pub_v1',JSON.stringify(pub));
  }catch(e){}}

/* ── Sidebar metric ────────────────────────────────── */
/* ════════════════════════════════════════════════════════
   VISTA MÓVIL — operativa diaria: turnos del día, ausencias,
   avisos y coste laboral. Solo se muestra en móvil (ver CSS).
════════════════════════════════════════════════════════ */
let MOB_DAY=null;
let MOB_FICHAR=false;
function mobSetDay(d){ if(DIAS.includes(d)) MOB_DAY=d; renderMobile(); }
function mobFichar(on){ MOB_FICHAR=!!on; if(!on){ FICHAJE_PIN=''; FICHAJE_MSG=null; } renderMobile(); }

function renderMobile(){
  const box=$('mobile-view'); if(!box) return;

  if(!DB.empleados.length){
    box.innerHTML=`<div class="mb-empty"><div class="mb-e-ic">👥</div><h3>Aún no hay equipo</h3><p>Da de alta a tu plantilla y monta el cuadrante desde el ordenador. Aquí podrás consultar los turnos y el coste de un vistazo.</p></div>`;
    return;
  }

  const w=curWeek();
  const todayWid=isoWeekId(new Date());
  const todayDow=(new Date().getDay()||7)-1;          // 0=Lun .. 6=Dom
  const isCurWeek=DB.semanaActual===todayWid;
  if(!MOB_DAY||!DIAS.includes(MOB_DAY)) MOB_DAY=DIAS[todayDow];
  const selIdx=DIAS.indexOf(MOB_DAY);
  const esHoy=isCurWeek&&MOB_DAY===DIAS[todayDow];
  const diaNom=DIAS_FULL[selIdx].toLowerCase();
  const LETRAS=['L','M','X','J','V','S','D'];

  /* ── Bloque 1: turnos del día seleccionado ── */
  function turnoHtml(tn){
    const items=w.asignaciones.filter(a=>a.dia===MOB_DAY&&a.turno===tn)
      .map(a=>({a,e:emp(a.empId)})).filter(x=>x.e)
      .sort((x,y)=>(x.a.ini||'').localeCompare(y.a.ini||''));
    const head=`<div class="mb-turno-hd"><span>${tn==='Comida'?'🍽️ Comida':'🌙 Cena'}</span><span class="mb-turno-n">${items.length||'—'}</span></div>`;
    if(!items.length) return head+`<div class="mb-none">Sin turnos asignados</div>`;
    return head+items.map(({a,e})=>`<div class="mb-shift"><span class="mb-shift-name">${esc(e.nombre)}</span><span class="emp-role-tag ${roleClass(e.rol)}">${esc(e.rol)}</span><span class="mb-shift-time">${a.ini}–${a.fin}</span></div>`).join('');
  }

  /* ── Bloque 3: esta semana — vacaciones + quién libra ── */
  const monday=weekIdToMonday(DB.semanaActual);
  const sunday=new Date(monday); sunday.setUTCDate(monday.getUTCDate()+6);
  const mISO=monday.toISOString().slice(0,10), sISO=sunday.toISOString().slice(0,10);
  const deVac=[];
  DB.empleados.forEach(e=>{(e.vacaciones||[]).forEach(v=>{ if(v.inicio&&v.fin&&v.inicio<=sISO&&v.fin>=mISO) deVac.push({e,v}); });});
  const libran=DB.empleados.filter(e=>e.diaDescanso&&DIAS_FULL[selIdx]===e.diaDescanso);

  /* ── Bloque 4: avisos ── */
  const avisos=[];
  proximasCelebraciones(14).slice(0,2).forEach(c=>avisos.push({ic:'🎂',t:c.txt}));

  if(horasExtraPend>0) avisos.push({ic:'⏱️',t:`<b>${fc(horasExtraPend,1)} h</b> extra pendientes de pagar o compensar.`});

  /* ── Bloque 5: coste laboral / ventas ── */
  const ventas=ventasSemana(w), coste=costeSemana(w);
  const pct=ventas>0?coste/ventas*100:null, cls=pctClass(pct), t=DB.config.targetPct||30;
  const costColor=cls==='ok'?'var(--green)':cls==='warn'?'var(--ylw)':cls==='bad'?'var(--red)':'var(--tx3)';

  // ── Móvil RRHH: solo lectura · quién está trabajando ahora (fichar es para empleados en tablet) ──
  const fxDentro=DB.empleados.map(e=>({e,st:estadoFichaje(e.id)})).filter(x=>x.st.dentro);
  const fxCerrados=DB.empleados.map(e=>({e,st:estadoFichaje(e.id)})).filter(x=>!x.st.dentro&&x.st.fichajes.length);
  const fichajeCard=`
    <div class="mb-fichaje">
      <div class="mb-fx-hd"><span><span class="mb-fx-livedot"></span>Trabajando ahora</span>${fxDentro.length?`<span class="mb-fx-n">${fxDentro.length} dentro</span>`:''}</div>
      ${fxDentro.length
        ?`<div class="mb-fx-list">${fxDentro.map(({e,st})=>`<div class="mb-fx-row"><span class="mb-fx-dot"></span><span class="mb-fx-name">${esc(e.nombre)}</span><span class="mb-fx-since">desde ${fmtHora(st.desde)} · ${fmtHM(st.min)}</span></div>`).join('')}</div>`
        :`<div class="mb-none">Nadie ha fichado entrada todavía.</div>`}
      ${fxCerrados.length?`<div class="mb-fx-closed">${fxCerrados.map(({e,st})=>`<div class="mb-fx-crow"><span class="mb-fx-name">${esc(e.nombre)}</span><span class="mb-fx-since">${fmtHM(st.min)} hoy</span></div>`).join('')}</div>`:''}
    </div>`;

  box.innerHTML=`
    ${fichajeCard}
    <div class="mb-week">
      <button onclick="navWeek(-1)" aria-label="Semana anterior">‹</button>
      <span>${weekLabel(DB.semanaActual)}</span>
      <button onclick="navWeek(1)" aria-label="Semana siguiente">›</button>
    </div>

    <div class="mb-daysel">${diaChips}</div>

    <div class="mb-section-t">${esHoy?'Turnos de hoy':'Turnos · '+diaNom}</div>
    <div class="mb-turnos">
      <div class="mb-turno">${turnoHtml('Comida')}</div>
      <div class="mb-turno">${turnoHtml('Cena')}</div>
    </div>

    <div class="mb-section-t">Esta semana</div>
    <div class="mb-card">
      <div class="mb-line-lbl">De vacaciones</div>
      ${deVac.length?deVac.map(({e,v})=>`<div class="mb-line"><span class="mb-line-name">${esc(e.nombre)}</span><span class="mb-line-meta">${fmtDay(v.inicio)} – ${fmtDay(v.fin)}</span></div>`).join(''):`<div class="mb-none">Nadie de vacaciones.</div>`}
      <div class="mb-line-lbl" style="margin-top:.75rem">Libran ${esHoy?'hoy':'el '+diaNom}</div>
      ${libran.length?`<div class="mb-tags">${libran.map(e=>`<span class="mb-tag">${esc(e.nombre)}</span>`).join('')}</div>`:`<div class="mb-none">Nadie libra.</div>`}
    </div>

    ${avisos.length?`<div class="mb-section-t">Avisos</div><div class="mb-ins">${avisos.map(a=>`<div class="mb-ins-row"><span class="mb-ins-ic">${a.ic}</span> ${a.t}</div>`).join('')}</div>`:''}

    <div class="mb-cost" style="border-left-color:${pct!=null?costColor:'var(--bdr)'}">
      <span class="mb-cost-dot" style="background:${costColor}"></span>
      <span class="mb-cost-lbl">Coste laboral / ventas</span>
      <span class="mb-cost-val" style="color:${pct!=null?costColor:'var(--tx3)'}">${pct!=null?fc(pct,1)+'%':'—'}</span>
      <span class="mb-cost-obj">obj. ${t}%</span>
    </div>
  `;
  if(MOB_FICHAR) renderPad();
}

function updateSidebar(){

    <div class="kpi"><div class="kpi-lbl">Horas planificadas</div><div class="kpi-val">${fc(totHoras,0)} h</div><div class="kpi-sub">${w.asignaciones.length} turnos</div></div>

function renderEmpleados(){
  const pg=$('pg-empleados'),w=curWeek();
  const salaEmps=DB.empleados.filter(e=>e.rol==='Sala'||e.rol==='Barra');
  const cocEmps=DB.empleados.filter(e=>e.rol==='Cocina'||e.rol==='Office');
  pg.innerHTML=`<div class="page-hd"><h2>Empleados</h2><button class="btn btn-amber btn-sm" onclick="openEmpModal()">+ Añadir empleado</button></div>
  ${!DB.empleados.length?`<div class="empty"><div class="empty-icon">🧑‍🍳</div><h3>Aún no hay nadie en plantilla</h3><p>Añade a cada persona con su rol y salario bruto mensual.</p><button class="btn btn-amber" onclick="openEmpModal()">+ Añadir el primero</button></div>`:
  `${salaEmps.length?`<div class="panel-title" style="margin-bottom:.75rem;font-size:11px">SALA Y BARRA <span style="opacity:.5">(${salaEmps.length})</span></div><div class="emp-grid" style="margin-bottom:1.5rem">${salaEmps.map(e=>empCard(e,w)).join('')}</div>`:''}
  ${cocEmps.length?`<div class="panel-title" style="margin-bottom:.75rem;font-size:11px">COCINA Y OFFICE <span style="opacity:.5">(${cocEmps.length})</span></div><div class="emp-grid">${cocEmps.map(e=>empCard(e,w)).join('')}</div>`:''}`}`;
}
function empCard(e,w){
  const hSem=horasEmpSemana(w,e.id),sH=calcSalarioHora(e),pasivo=calcPasivoLaboral(e);
  const over=e.horasContrato&&hSem>e.horasContrato;
  return `<div class="emp-card">
    <div class="emp-card-top">
      ${empAvatar(e)}
      <div><div class="emp-card-name">${esc(e.nombre)}</div><div class="emp-card-rol"><span class="emp-role-tag ${roleClass(e.rol)}">${esc(e.rol)}</span> · ${esc(e.contrato||'—')}</div></div>
    </div>
    <div class="emp-card-stats">
      <div class="emp-card-stat"><span>Salario bruto/mes</span><span>${fc(e.salarioBrutoMes||0,0)} €</span></div>
      <div class="emp-card-stat"><span>→ €/hora bruto</span><span>${fc(sH)} €/h</span></div>
      <div class="emp-card-stat"><span>Coste empresa/hora</span><span>${fc(sH*DB.config.ssMult)} €/h</span></div>
      <div class="emp-card-stat"><span>Contrato</span><span>${e.horasContrato?fc(e.horasContrato,0)+' h/sem':'—'}</span></div>
      <div class="emp-card-stat"><span>Planif. esta semana</span><span style="color:${over?'var(--red)':'inherit'}">${fc(hSem,1)} h</span></div>
      <div class="emp-card-stat"><span>Descanso estándar</span><span>${e.diaDescanso?esc(e.diaDescanso):'—'}</span></div>
      <div class="emp-card-stat"><span>Pasivo laboral</span><span>${pasivo>0?`<span class="pasivo-tag">${fk(pasivo)} €</span>`:'—'}</span></div>
    </div>
    <div class="emp-card-acts">
      <button class="btn btn-ghost btn-sm" onclick="openEmpModal('${e.id}')">Editar</button>
      <button class="btn btn-danger btn-sm" onclick="delEmp('${e.id}')">Baja</button>
    </div>
  </div>`;
}
function openEmpModal(id){
  const e=id?emp(id):{};const hc=Number(e.horasContrato)||40;
  const host=$('modal-host');
  host.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${id?'Editar empleado':'Nuevo empleado'}</h3>
    <p class="modal-desc">El salario bruto mensual y las horas de contrato calculan automáticamente el coste por hora.</p>
    <div class="field"><label>Nombre</label><input id="em-nombre" value="${esc(e.nombre||'')}" placeholder="Ej. Ana García"></div>
    <div class="field-row">
      <div class="field"><label>Rol</label><select id="em-rol">${ROLES.map(r=>`<option ${e.rol===r?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="field"><label>Tipo de contrato</label><select id="em-contrato" onchange="empContratoChange()">${['Jornada completa','Media jornada','Fijo discontinuo','Extra / por horas'].map(c=>`<option ${(e.contrato||'Jornada completa')===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Salario bruto mensual (€)</label><input id="em-salario-mes" type="number" step="1" value="${e.salarioBrutoMes||''}" placeholder="1400" oninput="empSalaryPreview()"><div class="field-hint">Bruto mensual sin pagas extra. La SS de empresa se añade automáticamente.</div></div>
      <div class="field"><label>Horas/semana contrato</label><input id="em-horas" type="number" step="1" value="${hc}" placeholder="40" oninput="empSalaryPreview()"></div>
    </div>
    <div class="salary-preview" id="em-sal-preview"></div>
    <div class="field-row">
      <div class="field"><label>Fecha de incorporación</label><input id="em-alta" type="date" value="${e.fechaAlta||''}"></div>
      <div class="field"><label>Día de descanso estándar</label><select id="em-descanso"><option value="">Sin definir</option>${DIAS_FULL.map(d=>`<option ${e.diaDescanso===d?'selected':''}>${d}</option>`).join('')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>PIN de fichaje (4 dígitos)</label><input id="em-pin" type="text" inputmode="numeric" maxlength="4" value="${e.pin||''}" placeholder="Ej. 1234"><div class="field-hint">Cada persona ficha su entrada/salida con este PIN. Debe ser único.</div></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-amber btn-sm" onclick="saveEmp('${id||''}')">${id?'Guardar':'Añadir'}</button>
    </div>
  </div></div>`;
  empSalaryPreview();
}
function empContratoChange(){
  const c=$('em-contrato').value;
  if(c==='Jornada completa')$('em-horas').value='40';
  else if(c==='Media jornada')$('em-horas').value='20';
  empSalaryPreview();
}
function empSalaryPreview(){
  const mes=parseFloat($('em-salario-mes')?.value)||0;
  const hSem=parseFloat($('em-horas')?.value)||40;
  const pv=$('em-sal-preview');if(!pv)return;
  if(mes<=0){pv.innerHTML='';return;}
  const porHora=mes/(hSem*4.33);
  const costeEmpresa=porHora*DB.config.ssMult;
  pv.innerHTML=`<div><strong>${fc(porHora)} €/h</strong> bruto</div><div><strong>${fc(costeEmpresa)} €/h</strong> coste empresa</div><div><strong>${fc(mes*12,0)} €/año</strong> anual</div>`;
}
function saveEmp(id){
  const nombre=$('em-nombre').value.trim();
  if(!nombre){toast('Pon al menos el nombre');return;}
  const pin=($('em-pin')?.value||'').trim();
  if(pin&&!/^\d{4}$/.test(pin)){toast('El PIN debe tener exactamente 4 dígitos');return;}
  if(pin&&DB.empleados.some(e=>e.id!==id&&(e.pin||'')===pin)){toast('Ese PIN ya lo usa otra persona');return;}
  const salarioBrutoMes=parseFloat($('em-salario-mes').value)||0;
  const horasContrato=parseFloat($('em-horas').value)||40;
  const salarioHora=salarioBrutoMes>0?salarioBrutoMes/(horasContrato*4.33):0;
  const obj={nombre,rol:$('em-rol').value,contrato:$('em-contrato').value,salarioBrutoMes,salarioHora,horasContrato,fechaAlta:$('em-alta').value||'',diaDescanso:$('em-descanso').value||'',pin};
  if(id){const e=emp(id);Object.assign(e,obj);}
  else{obj.id=uid();obj.cumple='';obj.prefs='';obj.skills=[];obj.personal={};obj.vacaciones=[];obj.imagen='';DB.empleados.push(obj);}
  saveDB();closeModal();renderEmpleados();updateSidebar();toast(id?'Empleado actualizado':'Empleado añadido');
}
function delEmp(id){
  const e=emp(id);if(!e)return;
  confirmModal(`Dar de baja a ${esc(e.nombre)}`,'Se quitará de la plantilla y de los cuadrantes.',()=>{
    DB.empleados=DB.empleados.filter(x=>x.id!==id);
    Object.values(DB.semanas).forEach(s=>{s.asignaciones=(s.asignaciones||[]).filter(a=>a.empId!==id);s.extras=(s.extras||[]).filter(x=>x.empId!==id);});
    saveDB();closeModal();renderEmpleados();updateSidebar();toast('Empleado dado de baja');
  });
}

// Refresco en vivo del cuadrante mientras esté abierto (sin tocar lo planificado)
let CUAD_LIVE_TIMER=null;
function startCuadLive(){
  clearInterval(CUAD_LIVE_TIMER);
  CUAD_LIVE_TIMER=setInterval(()=>{
    const act=document.querySelector('.tab[data-page].active');
    if(act&&act.dataset.page==='cuadrante'){
      // Recarga remoto por si alguien fichó desde la tablet, y repinta
      if(typeof sbGetRRHH==='function'){sbGetRRHH().then(remote=>{
        if(remote&&Array.isArray(remote.fichajes)){
          const localN=(DB.fichajes||[]).length, remoteN=remote.fichajes.length;
          if(remoteN!==localN&&!LOCAL_DIRTY){
            DB.fichajes=remote.fichajes;

            if(recalcExtrasAuto(DB.semanaActual)){saveDB();}
          }
        }
        renderCuadrante();
      }).catch(()=>renderCuadrante());}
      else renderCuadrante();
    }

function renderCuadRows(label,emps,rolKey,w,isCurWeek,todayDow){
  if(!emps.length)return'';
  const cols=9; // nombre + 7 dias + semana
  let html=`<tr><td colspan="${cols}" class="cuad-section-hd">${esc(label)}<span class="count-badge">${emps.length}</span></td></tr>`;
  emps.forEach(e=>{
    const hSem=horasEmpSemana(w,e.id),cSem=w.asignaciones.filter(a=>a.empId===e.id).reduce((s,a)=>s+asignCoste(a),0);
    const over=e.horasContrato&&hSem>e.horasContrato;
    const isDescanso=d=>e.diaDescanso&&DIAS_FULL[DIAS.indexOf(d)]===e.diaDescanso;
    const hReal=horasFichadasSemana(e.id,DB.semanaActual);
    const hCerr=horasCerradasSemana(e.id,DB.semanaActual);
    const hcE=Number(e.horasContrato)||0;
    const extraAuto=hcE?Math.round((hCerr-hcE)*100)/100:0;
    html+=`<tr>
      <td class="cuad-emp-cell"><div class="cuad-emp-name">${esc(e.nombre)}</div><div class="cuad-emp-sub"><span class="emp-role-tag ${roleClass(e.rol)}">${esc(e.rol)}</span> ${fc(calcSalarioHora(e),1)}€/h${e.diaDescanso?` · lib. ${e.diaDescanso.slice(0,3)}`:''}</div></td>
      ${DIAS.map((d,di)=>{
        const cells=w.asignaciones.filter(a=>a.empId===e.id&&a.dia===d);
        const bg=isDescanso(d)&&!cells.length?'background:repeating-linear-gradient(135deg,transparent,transparent 4px,var(--bg) 4px,var(--bg) 8px);':'';
        const esHoyCol=isCurWeek&&di===todayDow;
        let liveHtml='';
        if(esHoyCol){
          const st=estadoFichaje(e.id);
          if(st.dentro){liveHtml=`<div class="cuad-live"><span class="cuad-live-dot"></span>En curso<span class="cuad-live-clock">${fmtHora(st.desde)}</span></div>`;}
          else if(st.fichajes.length){liveHtml=`<div class="cuad-live fuera">Fichó ${fmtHM(st.min)}</div>`;}
        }
        return `<td class="cuad-cell" style="${bg}" onclick="openTurno('${e.id}','${d}')">${cells.length?cells.map(a=>`<span class="cuad-chip ${a.turno.toLowerCase()}">${esc(a.turno[0])} ${esc(a.ini)}-${esc(a.fin)}</span>`).join(''):(liveHtml?'':'<span class="cuad-chip-empty">+</span>')}${liveHtml}</td>`;
      }).join('')}
      <td class="cuad-total-cell ${over?'cuad-over':''}"><div class="cuad-total-h">${fc(hSem,1)} h</div><div class="cuad-total-sub">${fk(cSem)}€${e.horasContrato?` / ${fc(e.horasContrato,0)}h`:''}</div>${hReal>0.05?`<div class="cuad-total-real">Real ${fc(hReal,1)} h${extraAuto>0.05?` <span class="cuad-extra-tag">+${fc(extraAuto,1)} extra</span>`:''}</div>`:''}</td>
    </tr>`;
  });
  TURNOS.forEach(tn=>{
    html+=`<tr><td class="cuad-emp-cell" style="font-size:10px;font-weight:600;color:var(--tx3)">Dotación ${tn}</td>
    ${DIAS.map(d=>{
      const have=w.asignaciones.filter(a=>a.dia===d&&a.turno===tn&&emps.some(e=>e.id===a.empId)).length;
      const need=staffNeeded(w,d,tn,rolKey);
      if(need<=0)return `<td class="cuad-staff" style="color:var(--tx3)">—</td>`;
      const cls=have>=need?'cuad-staff-ok':have>=need-1?'cuad-staff-warn':'cuad-staff-bad';
      return `<td class="cuad-staff ${cls}">${have}/${need}</td>`;
    }).join('')}<td class="cuad-total-cell"></td></tr>`;
  });
  return html;
}

/* ── Saldo de vacaciones (estándar España: 30 días naturales/año por defecto) ── */
function vacDiasPeriodo(v){if(!v||!v.inicio||!v.fin)return 0;const a=new Date(v.inicio),b=new Date(v.fin);if(isNaN(a)||isNaN(b)||b<a)return 0;return Math.round((b-a)/86400000)+1;}
function vacTotalAnual(e){return Number(e.diasVacacionesAnuales)>0?Number(e.diasVacacionesAnuales):30;}
function vacConsumidas(e,year){year=year||new Date().getFullYear();return(e.vacaciones||[]).filter(v=>v.inicio&&new Date(v.inicio).getFullYear()===year).reduce((s,v)=>s+vacDiasPeriodo(v),0);}
function vacSaldo(e,year){return vacTotalAnual(e)-vacConsumidas(e,year);}
function tenure(fecha){if(!fecha)return'';const d=new Date(fecha),now=new Date();let m=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());if(m<0)return'';if(m<1)return'<1 mes';if(m<12)return m+' mes'+(m>1?'es':'');const y=Math.floor(m/12),rm=m%12;return y+' año'+(y>1?'s':'')+(rm?' '+rm+'m':'');}
function fmtDay(iso){const d=new Date(iso);return d.getDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()];}
function fmtDate(iso){const d=new Date(iso);return d.getDate()+' '+['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]+' '+d.getFullYear();}
function proximasCelebraciones(dias){
  const out=[],now=new Date();now.setHours(0,0,0,0);
  DB.empleados.forEach(e=>{
    if(e.cumple){const c=new Date(e.cumple);const next=new Date(now.getFullYear(),c.getMonth(),c.getDate());if(next<now)next.setFullYear(now.getFullYear()+1);const diff=Math.round((next-now)/86400000);if(diff<=dias)out.push({diff,txt:`<strong>${esc(e.nombre)}</strong> cumple años el ${fmtDay(e.cumple)}${diff===0?' (¡hoy!)':diff===1?' (mañana)':` (en ${diff} días)`}`});}
    if(e.fechaAlta){const a=new Date(e.fechaAlta);const next=new Date(now.getFullYear(),a.getMonth(),a.getDate());if(next<now)next.setFullYear(now.getFullYear()+1);const diff=Math.round((next-now)/86400000);const years=next.getFullYear()-a.getFullYear();if(diff<=dias&&years>0)out.push({diff,txt:`<strong>${esc(e.nombre)}</strong> cumple ${years} año${years>1?'s':''} en el equipo el ${fmtDay(e.fechaAlta)}${diff===0?' (¡hoy!)':diff===1?' (mañana)':` (en ${diff} días)`}`});}
  });
  return out.sort((a,b)=>a.diff-b.diff);
}

function mkChart(id,type,labels,datasets,opts={}){const el=$(id);if(!el)return;const ex=CHARTS.find(c=>c.canvas&&c.canvas.id===id);if(ex){try{ex.destroy();}catch(e){}}const isCircular=type==='doughnut'||type==='pie';const c=new Chart(el,{type,data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},...(opts.plugins||{})},scales:isCircular?undefined:{y:{beginAtZero:true,grid:{color:'#EDEBE6'},ticks:{font:{size:10},color:'#98A3AC',...(opts.scales&&opts.scales.y&&opts.scales.y.ticks||{})}},x:{grid:{display:false},ticks:{font:{size:10},color:'#98A3AC'}}}}});CHARTS.push(c);return c;}

/* ═══════════════ FICHAJE / REGISTRO DE JORNADA ═══════════════
   Registro de entrada/salida por empleado mediante PIN (obligatorio en España).
   Persiste en DB.fichajes y sincroniza a Supabase como el resto del estado.
   Compara lo planificado (cuadrante) con lo realmente fichado. */
let FICHAJE_PIN='', FICHAJE_MSG=null;
function fichajesDia(empId,fechaISO){return (DB.fichajes||[]).filter(f=>f.empId===empId&&f.fecha===fechaISO).sort((a,b)=>a.ts.localeCompare(b.ts));}
function minFichadosDia(empId,fechaISO){
  const fs=fichajesDia(empId,fechaISO); let min=0,lastIn=null;
  fs.forEach(f=>{ if(f.tipo==='entrada')lastIn=f.ts; else if(f.tipo==='salida'&&lastIn){min+=(new Date(f.ts)-new Date(lastIn))/60000;lastIn=null;} });
  if(lastIn&&fechaISO===new Date().toISOString().slice(0,10)) min+=(Date.now()-new Date(lastIn))/60000;
  return Math.max(0,min);
}
function estadoFichaje(empId){
  const hoy=new Date().toISOString().slice(0,10); const fs=fichajesDia(empId,hoy);
  let dentro=false,desde=null;
  fs.forEach(f=>{ if(f.tipo==='entrada'){dentro=true;desde=f.ts;} else if(f.tipo==='salida'){dentro=false;desde=null;} });
  return {dentro,desde,min:minFichadosDia(empId,hoy),fichajes:fs};
}
function horasFichadasSemana(empId,wid){
  const m=weekIdToMonday(wid); let min=0;
  for(let i=0;i<7;i++){ const d=new Date(Date.UTC(m.getUTCFullYear(),m.getUTCMonth(),m.getUTCDate()+i)).toISOString().slice(0,10); min+=minFichadosDia(empId,d); }
  return min/60;
}
/* Horas reales de jornadas CERRADAS en la semana (ignora turnos aún abiertos).
   Sirve para derivar horas extra sin contar a quien sigue fichado dentro. */
function horasCerradasSemana(empId,wid){
  const m=weekIdToMonday(wid); let min=0;
  for(let i=0;i<7;i++){
    const d=new Date(Date.UTC(m.getUTCFullYear(),m.getUTCMonth(),m.getUTCDate()+i)).toISOString().slice(0,10);
    const fs=fichajesDia(empId,d);
    // si el día acaba en 'entrada' sin salida, ese tramo está abierto: minFichadosDia ya lo
    // contaría hasta "ahora" sólo si es hoy; para extras sólo contamos pares entrada-salida completos
    let lastIn=null;
    fs.forEach(f=>{ if(f.tipo==='entrada')lastIn=f.ts; else if(f.tipo==='salida'&&lastIn){min+=(new Date(f.ts)-new Date(lastIn))/60000;lastIn=null;} });
  }
  return min/60;
}
/* Recalcula las horas extra AUTOMÁTICAS de una semana a partir del fichaje real.
   Regla: si las horas reales cerradas de la semana superan el contrato, el exceso
   se registra como extra automática. No toca las extras añadidas a mano (sin .auto).
   Devuelve true si cambió algo (para guardar). */
function recalcExtrasAuto(wid){
  if(!wid||!DB.semanas[wid])return false;
  const w=DB.semanas[wid];
  w.extras=w.extras||[];
  let changed=false;
  DB.empleados.forEach(e=>{
    const hc=Number(e.horasContrato)||0;
    if(!hc)return; // sin contrato definido no se puede comparar
    const reales=horasCerradasSemana(e.id,wid);
    const exceso=Math.round((reales-hc)*100)/100;
    const idx=w.extras.findIndex(x=>x.empId===e.id&&x.auto);
    if(exceso>0.05){
      const fechaRef=weekIdToMonday(wid).toISOString().slice(0,10);
      if(idx>=0){
        if(Math.abs((Number(w.extras[idx].horas)||0)-exceso)>0.01){w.extras[idx].horas=exceso;w.extras[idx].fecha=fechaRef;changed=true;}
      }else{
        w.extras.push({id:uid(),empId:e.id,fecha:fechaRef,horas:exceso,motivo:'Exceso sobre contrato (fichaje real)',estado:'pendiente',auto:true});
        changed=true;
      }
    }else if(idx>=0){
      // Ya no hay exceso: elimina la extra automática previa
      w.extras.splice(idx,1);changed=true;
    }
  });
  return changed;
}
function fmtHM(min){ min=Math.round(min); const h=Math.floor(min/60),m=min%60; return h>0?`${h}h ${m}m`:`${m}m`; }

/* Detecta olvidos de fichaje para avisar al gestor (patrón del mercado:
   alertas cuando alguien olvida fichar). Dos casos:
   1) Jornada abierta anómala: fichó entrada hace >10h sin cerrar salida.
   2) Tenía turno planificado hoy y, pasada la hora + margen, no ha fichado entrada. */
function alertasFichaje(){
  const out=[];const now=new Date();
  const w=DB.semanas[DB.semanaActual];
  const dowIdx=(now.getDay()||7)-1;
  const diaHoy=DIAS[dowIdx];
  (DB.empleados||[]).forEach(e=>{
    const st=estadoFichaje(e.id);
    if(st.dentro && st.min>10*60){
      out.push({type:'warn',label:'Posible olvido de salida',txt:`${e.nombre} lleva ${fmtHM(st.min)} fichado sin cerrar. Revisa si olvidó fichar la salida.`});
    }
    if(w && diaHoy && !st.fichajes.length){
      const turnoHoy=(w.asignaciones||[]).filter(a=>a.empId===e.id&&a.dia===diaHoy);
      turnoHoy.forEach(a=>{
        if(a.ini){
          const[hh,mm]=a.ini.split(':').map(Number);
          const inicio=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm);
          if(now-inicio>30*60000 && now-inicio<8*3600000){
            out.push({type:'warn',label:'Sin fichar con turno asignado',txt:`${e.nombre} tenía turno a las ${a.ini} y aún no ha fichado entrada.`});
          }
        }
      });
    }
  });
  const seen=new Set();
  return out.filter(a=>{const k=a.label+a.txt.slice(0,20);if(seen.has(k))return false;seen.add(k);return true;}).slice(0,4);
}
function ficharAhora(empId){
  const e=emp(empId); if(!e)return;

function renderFichajeRecords(){

    return `<tr>

      <td class="td-num"><span class="${Math.abs(dif)<0.25?'':dif>0?'fich-up':'fich-down'}">${dif>0?'+':''}${fc(dif,1)} h</span></td>
    </tr>`;
  }).filter(Boolean).join('');
  box.innerHTML=`
    <div class="fich-card">
      <div class="fich-card-h">Hoy · ${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
      ${hoyRows?`<div class="tbl-wrap"><table><thead><tr><th>Empleado</th><th>Estado</th><th>Fichajes</th><th class="td-num">Trabajado</th></tr></thead><tbody>${hoyRows}</tbody></table></div>`:`<p class="fich-empty">Aún nadie ha fichado hoy.</p>`}
