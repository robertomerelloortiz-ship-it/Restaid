        <span style="font-size:11.5px;color:var(--tx3);font-weight:400">${weekLabel(wid)}</span></div>
      ${semRows?`<div class="tbl-wrap"><table><thead><tr><th>Empleado</th><th class="td-num">Planificado</th><th class="td-num">Fichado</th><th class="td-num">Desvío</th></tr></thead><tbody>${semRows}</tbody></table></div>
      <p class="fich-note">Planificado = horas del cuadrante. Fichado = horas reales registradas. El desvío te avisa de horas de más o de menos.</p>`:`<p class="fich-empty">Sin horas planificadas ni fichadas esta semana.</p>`}
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="exportFichajesCSV()">⬇ CSV</button><button class="btn btn-amber btn-sm" onclick="abrirInformeMensual()">📄 Informe mensual (Inspección)</button></div>
    </div>`;
}
function exportFichajesCSV(){
  const fs=(DB.fichajes||[]).slice().sort((a,b)=>a.ts.localeCompare(b.ts));
  if(!fs.length){ toast('No hay fichajes que exportar'); return; }
  const nombre=id=>{const e=emp(id);return e?e.nombre:id;};
  const rows=[['Empleado','Tipo','Fecha','Hora','Timestamp ISO']];
  fs.forEach(f=>rows.push([nombre(f.empId),f.tipo,f.fecha,fmtHora(f.ts),f.ts]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='fichajes_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Registro exportado');
}

function abrirInformeMensual(){
  const now=new Date();

  const optsMes=meses.map((m,i)=>`<option value="${i}" ${i===now.getMonth()?'selected':''}>${m}</option>`).join('');
  const years=[];for(let y=now.getFullYear();y>=now.getFullYear()-2;y--)years.push(y);
  const optsYear=years.map(y=>`<option value="${y}">${y}</option>`).join('');
  const optsEmp=`<option value="__all__">Toda la plantilla</option>`+(DB.empleados||[]).map(e=>`<option value="${e.id}">${esc(e.nombre)}</option>`).join('');
  $('modal-host').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>Informe mensual de jornada</h3>
    <p class="modal-desc">Documento oficial de registro horario (RD-ley 8/2019). Se abre listo para imprimir o guardar como PDF.</p>
    <div class="field-row">
      <div class="field"><label>Mes</label><select id="inf-mes">${optsMes}</select></div>
      <div class="field"><label>Año</label><select id="inf-year">${optsYear}</select></div>
    </div>
    <div class="field"><label>Empleado</label><select id="inf-emp">${optsEmp}</select></div>
    <div class="modal-actions"><button class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button><button class="btn btn-amber btn-sm" onclick="generarInformeMensual()">Generar documento</button></div>
  </div></div>`;
}
function _difMinFichajes(fs){let min=0,lastIn=null;fs.slice().sort((a,b)=>a.ts.localeCompare(b.ts)).forEach(f=>{if(f.tipo==='entrada')lastIn=f.ts;else if(f.tipo==='salida'&&lastIn){min+=(new Date(f.ts)-new Date(lastIn))/60000;lastIn=null;}});return min;}
function generarInformeMensual(){
  const mes=Number($('inf-mes').value),year=Number($('inf-year').value),empSel=$('inf-emp').value;
  closeModal();
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const empresa=(DB.config&&DB.config.empresa)||'Hostelería Merello S.L. · TalaBar';
  const cif=(DB.config&&DB.config.cif)||'';
  const lista=empSel==='__all__'?DB.empleados:DB.empleados.filter(e=>e.id===empSel);
  if(!lista.length){toast('Sin empleados');return;}
  const diasMes=new Date(year,mes+1,0).getDate();
  const nombreMes=meses[mes];
  const secciones=lista.map(e=>{
    let totMin=0;let filas='';
    for(let d=1;d<=diasMes;d++){
      const fecha=`${year}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const fs=(DB.fichajes||[]).filter(f=>f.empId===e.id&&f.fecha===fecha).sort((a,b)=>a.ts.localeCompare(b.ts));
      const dow=new Date(year,mes,d).getDay();
      const finde=dow===0||dow===6;
      if(!fs.length){
        filas+=`<tr class="${finde?'we':''}"><td>${String(d).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}</td><td class="dn">${['D','L','M','X','J','V','S'][dow]}</td><td colspan="4" class="empty-day">—</td></tr>`;
        continue;
      }
      const min=_difMinFichajes(fs);totMin+=min;
      const marcas=fs.map(f=>`${f.tipo==='entrada'?'E':'S'} ${fmtHora(f.ts)}`).join(' · ');
      const ent=fs.find(f=>f.tipo==='entrada');const sal=[...fs].reverse().find(f=>f.tipo==='salida');
      filas+=`<tr class="${finde?'we':''}"><td>${String(d).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}</td><td class="dn">${['D','L','M','X','J','V','S'][dow]}</td><td>${ent?fmtHora(ent.ts):'—'}</td><td>${sal?fmtHora(sal.ts):'—'}</td><td class="marcas">${marcas}</td><td class="tot">${(min/60).toFixed(2)} h</td></tr>`;
    }
    const totH=Math.floor(totMin/60),totM=Math.round(totMin%60);
    return `<section class="emp-sec">
      <div class="emp-hd">
        <div><div class="emp-nm">${esc(e.nombre)}</div><div class="emp-meta">${esc(e.rol||'')} · ${e.contrato||''} · ${e.horasContrato||'—'} h/semana contratadas</div></div>
        <div class="emp-tot"><span class="emp-tot-lbl">Total mes</span><span class="emp-tot-val">${totH}h ${String(totM).padStart(2,'0')}m</span></div>
      </div>
      <table class="reg-tbl"><thead><tr><th>Fecha</th><th>Día</th><th>Entrada</th><th>Salida</th><th>Marcajes del día</th><th>Horas</th></tr></thead><tbody>${filas}</tbody></table>
      <div class="firma"><div class="firma-box"><span>Firma de la persona trabajadora</span></div><div class="firma-box"><span>Firma de la empresa</span></div></div>
    </section>`;
  }).join('');
  const hoyStr=new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
  const doc=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Registro jornada ${nombreMes} ${year}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1a1a1a;font-size:11px;line-height:1.4;padding:24px}
    .doc-hd{border-bottom:2px solid #1A2B3C;padding-bottom:12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end}
    .doc-hd h1{font-size:17px;color:#1A2B3C}
    .doc-hd .sub{font-size:11px;color:#555;margin-top:3px}
    .doc-hd .emp-info{text-align:right;font-size:11px}
    .doc-hd .emp-info b{font-size:12px}
    .legal{font-size:9.5px;color:#666;background:#f4f4f2;border:1px solid #e0e0dc;border-radius:5px;padding:7px 10px;margin-bottom:18px}
    .emp-sec{margin-bottom:26px;page-break-inside:avoid}
    .emp-hd{display:flex;justify-content:space-between;align-items:center;background:#1A2B3C;color:#fff;padding:8px 12px;border-radius:5px 5px 0 0}
    .emp-nm{font-size:13px;font-weight:700}
    .emp-meta{font-size:10px;opacity:.85;margin-top:2px}
    .emp-tot{text-align:right}
    .emp-tot-lbl{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.05em;opacity:.8}
    .emp-tot-val{font-size:16px;font-weight:700}
    table.reg-tbl{width:100%;border-collapse:collapse;font-size:10px}
    .reg-tbl th{background:#eceae5;text-align:left;padding:5px 7px;border:1px solid #d5d2cc;font-size:9px;text-transform:uppercase;letter-spacing:.03em}
    .reg-tbl td{padding:4px 7px;border:1px solid #e2e0da}
    .reg-tbl tr.we td{background:#faf8f4}
    .reg-tbl td.dn{color:#888;font-weight:600;text-align:center;width:28px}
    .reg-tbl td.tot{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
    .reg-tbl td.marcas{color:#555;font-size:9px}
    .reg-tbl td.empty-day{color:#bbb;text-align:center}
    .firma{display:flex;gap:40px;margin-top:14px}
    .firma-box{flex:1;border-top:1px solid #999;padding-top:5px;text-align:center;font-size:9.5px;color:#666;height:48px;display:flex;align-items:flex-end;justify-content:center}
    .doc-ft{margin-top:24px;font-size:9px;color:#999;text-align:center;border-top:1px solid #e0e0dc;padding-top:10px}
    @media print{body{padding:0}@page{margin:14mm}.no-print{display:none}}
    .toolbar{position:sticky;top:0;background:#1A2B3C;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin:-24px -24px 18px;border-radius:0}
    .toolbar button{background:#F0A04B;color:#1a1207;border:none;padding:8px 18px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}
    .toolbar .t-info{font-size:12px}
  </style></head><body>
  <div class="toolbar no-print"><span class="t-info">Documento listo. Usa "Guardar como PDF" en el destino de impresión.</span><button onclick="window.print()">🖨 Imprimir / Guardar PDF</button></div>
  <div class="doc-hd">
    <div><h1>Registro de jornada laboral</h1><div class="sub">${nombreMes.charAt(0).toUpperCase()+nombreMes.slice(1)} de ${year}</div></div>
    <div class="emp-info"><b>${esc(empresa)}</b>${cif?`<br>CIF: ${esc(cif)}`:''}<br>Expedido: ${hoyStr}</div>
  </div>
  <div class="legal">Registro diario de jornada conforme al artículo 34.9 del Estatuto de los Trabajadores y al Real Decreto-ley 8/2019. Incluye hora de inicio y fin de cada jornada. La empresa conservará estos registros durante cuatro años a disposición de la persona trabajadora, sus representantes y la Inspección de Trabajo y Seguridad Social.</div>
  ${secciones}
  <div class="doc-ft">Generado por RESTAID · ${hoyStr} · Documento de control horario interno</div>
  </body></html>`;
  const wv=window.open('','_blank');
  if(!wv){toast('Permite ventanas emergentes para ver el informe');return;}

}

function saveFichaje(fid){

function delFichaje(fid){

function updateSuggestions(){const sg=$('ia-suggest');if(!sg)return;const isEmpty=!DB.empleados.length;const w=DB.semanas[DB.semanaActual];const hasShifts=w&&w.asignaciones&&w.asignaciones.length;const hasSales=w&&ventasSemana(w)>0;let sugs=[];if(isEmpty)sugs=['Da de alta a mi equipo: Ana (sala, 1400€/mes), Marcos (cocina, 1600€/mes)','Tengo 5 empleados, te los cuento'];else if(!hasSales)sugs=['Mete las ventas previstas de la semana','Genera el cuadrante de esta semana'];else if(!hasShifts)sugs=['Genera el cuadrante optimizando costes','Asigna a Ana el lunes en comida'];else sugs=['¿Cómo está el coste laboral?','Registra 2h extra de Marcos el viernes','Actualiza las vacaciones de Ana: 1-15 julio'];sg.innerHTML=sugs.map(s=>`<span class="ia-chip" onclick="askSuggest(this)">${s}</span>`).join('');sg.style.display='flex';}

function showTyping(){const box=$('ia-messages');const d=document.createElement('div');d.className='ia-msg bot';d.id='ia-typing-row';d.innerHTML='<div class="ia-avatar">R</div><div class="ia-bubble"><div class="ia-typing"><span></span><span></span><span></span></div></div>';box.appendChild(d);box.scrollTop=box.scrollHeight;}
function hideTyping(){const t=$('ia-typing-row');if(t)t.remove();}
function sendChat(){if(CHAT_BUSY)return;if(srRecording&&srInstance){srInstance.stop();srRecording=false;updMicBtn();}const inp=$('ia-input');const txt=inp.value.trim();if(!txt)return;inp.value='';pushMsg('user',txt);const sg=$('ia-suggest');if(sg)sg.style.display='none';callAI();}
function buildAIContext(){
  const w=curWeek(),ventas=ventasSemana(w),coste=costeSemana(w),pct=ventas>0?coste/ventas*100:null;
  if(!DB.empleados.length)return`ESTADO: sin empleados.\nSemana: ${weekLabel(DB.semanaActual)}\nObjetivo: ${DB.config.targetPct}%`;
  const emps=DB.empleados.map(e=>{const h=horasEmpSemana(w,e.id);const pasivo=calcPasivoLaboral(e);return`  id:${e.id} | ${e.nombre} | ${e.rol} | ${fc(e.salarioBrutoMes||0,0)}€/mes (${fc(calcSalarioHora(e))}€/h) | ${e.horasContrato||40}h/sem (${e.contrato||'—'}) | planif:${fc(h,1)}h | descanso:${e.diaDescanso||'—'} | prefs:${e.prefs||'—'} | cumple:${e.cumple||'—'} | skills:${(e.skills||[]).join(',')||'—'} | pasivo:${fk(pasivo)}€ | vacs:${(e.vacaciones||[]).map(v=>v.inicio+'→'+v.fin).join(',')||'—'}`;}).join('\n');
  const porDia=DIAS.map(d=>{const cd=costeDia(w,d),vd=ventasDia(w,d),p=vd>0?cd/vd*100:null;const asigs=w.asignaciones.filter(a=>a.dia===d).map(a=>{const e=emp(a.empId);return e?`${e.nombre}(${a.turno} ${a.ini}-${a.fin})`:'';}).filter(Boolean).join(', ');return`  ${d}: ventas ${fc(vd,0)}€, coste ${fc(cd,0)}€${p!=null?` (${fc(p,0)}%)`:''}${asigs?' | '+asigs:''}`;}).join('\n');
  const extras=Object.values(DB.semanas).flatMap(s=>s.extras||[]);const extrasPend={};extras.filter(x=>x.estado==='pendiente').forEach(x=>{const e=emp(x.empId);if(e)extrasPend[e.nombre]=(extrasPend[e.nombre]||0)+(Number(x.horas)||0);});
  const cel=proximasCelebraciones(30).map(c=>'  '+c.txt.replace(/<[^>]+>/g,'')).join('\n')||'  ninguna';
  return`EQUIPO — semana ${weekLabel(DB.semanaActual)}\nObjetivo: ${DB.config.targetPct}% | SS: ×${DB.config.ssMult} | Ticket medio: ${DB.config.ticketMedio}€\nMÉTRICA: ${pct!=null?fc(pct,1)+'%':'sin ventas'} | Ventas: ${fc(ventas,0)}€ | Coste: ${fc(coste,0)}€\n\nEMPLEADOS (${DB.empleados.length})\n${emps}\n\nSEMANA\n${porDia}\n\nEXTRAS PEND.\n${Object.keys(extrasPend).length?Object.keys(extrasPend).map(n=>'  '+n+': '+fc(extrasPend[n],1)+'h').join('\n'):'  ninguna'}\n\nCELEBRACIONES\n${cel}`;
}
const ACTION_SCHEMA=`
ACCIONES: embebe [ACTION]{"type":"...","data":{...}}[/ACTION] en tu texto.
Tipos: add_employee(nombre,rol,salarioBrutoMes,horasContrato,contrato,fechaAlta,diaDescanso,cumple,prefs,skills,personal:{telefono,estadoCivil,hijos,direccion,contactoEmergencia,notas},vacaciones:[{inicio,fin,motivo}])
update_employee(nombre para buscar + campos a cambiar), remove_employee(nombre), set_sales(dias:{Lun:{Comida:N,Cena:N},...})
assign_shift(nombre,dia:Lun-Dom,turno:Comida|Cena,ini,fin), assign_shifts_bulk(asignaciones:[...])
clear_shifts, log_overtime(nombre,fecha,horas,motivo,estado:pendiente|compensada|pagada), set_config(targetPct,ssMult,premiumExtra,ticketMedio)
Días: Lun,Mar,Mié,Jue,Vie,Sáb,Dom. salarioBrutoMes es mensual bruto. horasContrato=40 para jornada completa, 20 para media.`;
async function callAI(){
  CHAT_BUSY=true;$('ia-send').disabled=true;showTyping();
  const system=`Eres el asistente de RESTAID para gestión de personas y turnos de un restaurante en España. El usuario puede hablar por voz. Tu rol: (1) EJECUTAR altas, turnos, extras, ventas, fichas — con bloques de acción, (2) ASESORAR sobre costes, cuadrante, equipo. Conciso, cifras, acciones. Tono humano.\n${ACTION_SCHEMA}\n\n=== DATOS ===\n${buildAIContext()}`;
  const msgs=CHAT_HISTORY.slice(-10).map(m=>({role:m.role,content:m.content}));
  try{const res=await fetch(API_URL,{method:'POST',headers:aiHeaders(),body:JSON.stringify({model:MODEL,max_tokens:800,system,messages:msgs})});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();const rawTxt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'Sin respuesta.';hideTyping();const{clean,confirms}=execActions(rawTxt);pushMsg('assistant',clean,confirms);if(confirms.length){updateSidebar();updateSuggestions();}
  }catch(e){hideTyping();const box=$('ia-messages');const d=document.createElement('div');d.className='ia-msg bot';d.innerHTML='<div class="ia-avatar">R</div><div class="ia-bubble"><div class="ia-error">'+esc(aiKeyHint())+' El módulo funciona igual sin IA.</div></div>';box.appendChild(d);box.scrollTop=box.scrollHeight;CHAT_HISTORY.pop();}
  CHAT_BUSY=false;$('ia-send').disabled=false;
}
function mdToHtml(md){let h=esc(md);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');const lines=h.split('\n');let out='',inList=false;for(let line of lines){if(/^###\s+/.test(line)){if(inList){out+='</ul>';inList=false;}out+='<h4>'+line.replace(/^###\s+/,'')+'</h4>';}else if(/^##\s+/.test(line)){if(inList){out+='</ul>';inList=false;}out+='<h3>'+line.replace(/^##\s+/,'')+'</h3>';}else if(/^\s*[-*•]\s+/.test(line)){if(!inList){out+='<ul>';inList=true;}out+='<li>'+line.replace(/^\s*[-*•]\s+/,'')+'</li>';}else if(/^\s*\d+\.\s+/.test(line)){if(!inList){out+='<ul>';inList=true;}out+='<li>'+line.replace(/^\s*\d+\.\s+/,'')+'</li>';}else if(line.trim()===''){if(inList){out+='</ul>';inList=false;}}else{if(inList){out+='</ul>';inList=false;}out+='<p>'+line+'</p>';}}if(inList)out+='</ul>';return out;}

/* ── Sync entre módulos: refresh desde el shell u otras pestañas ── */
function refreshFromStorage(){
  DB=loadDB();sanitizeDB();updateSidebar();
  const act=document.querySelector('.tab[data-page].active');
  showPage(act&&act.dataset.page?act.dataset.page:'resumen');
  toast('Datos actualizados');
}
window.addEventListener('message',e=>{if(e&&e.data&&e.data.type==='restaid_refresh')refreshFromStorage();});
window.addEventListener('storage',e=>{if(e.key===STORE)refreshFromStorage();if(e.key==='restaid_pub_v1'){const w=DB.semanas[DB.semanaActual];if(w&&Object.keys(w.ventas||{}).length===0&&!w.ventasEditadas){if(prefillVentas(w)){saveDB();updateSidebar();const act=document.querySelector('.tab[data-page].active');if(act&&act.dataset.page==='cuadrante')renderCuadrante();}}}});

RESTAID.register('rrhh',{render:renderResumen});
publishCore();updateSidebar();renderResumen();
loadFromDB();
</script>
